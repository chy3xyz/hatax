<!-- layout: app-shell -->
<html>
<head>
  <title>新增用户</title>
</head>
<body>
<div id="page-content" x-data class="pt-28 p-6 space-y-6 animate-fade-in"
     :class="$store.app.sidebarOpen ? 'lg:ml-64' : 'lg:ml-0'">

  <nav class="flex items-center gap-1 text-sm text-gray-500 dark:text-gray-400" aria-label="Breadcrumb">
    <a href="/admin/dashboard.html" class="flex items-center gap-1 hover:text-primary transition-colors">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
      <span>首页</span>
    </a>
    <span class="text-gray-300">/</span>
    <a href="/admin/user.html" class="hover:text-primary transition-colors">用户管理</a>
    <span class="text-gray-300">/</span>
    <span class="text-gray-700 dark:text-gray-200 font-medium">新增用户</span>
  </nav>

  <h1 class="text-2xl font-bold">新增用户</h1>

  <div class="bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-700 p-6 max-w-2xl"
       x-data="userForm">
    <form @submit.prevent="handleSubmit" class="space-y-5">
      <div>
        <label class="block text-sm font-medium mb-1.5">用户名 <span class="text-red-500">*</span></label>
        <input type="text" x-model="form.username" placeholder="请输入用户名"
          class="w-full px-4 py-2.5 border rounded-lg dark:bg-gray-800 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-colors"
          :class="{ 'border-red-400': errors.username }">
        <div x-show="errors.username" class="form-error" x-text="errors.username"></div>
      </div>

      <div>
        <label class="block text-sm font-medium mb-1.5">手机号 <span class="text-red-500">*</span></label>
        <input type="text" x-model="form.phone" placeholder="请输入手机号"
          class="w-full px-4 py-2.5 border rounded-lg dark:bg-gray-800 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-colors"
          :class="{ 'border-red-400': errors.phone }">
        <div x-show="errors.phone" class="form-error" x-text="errors.phone"></div>
      </div>

      <div>
        <label class="block text-sm font-medium mb-1.5">邮箱</label>
        <input type="email" x-model="form.email" placeholder="请输入邮箱"
          class="w-full px-4 py-2.5 border rounded-lg dark:bg-gray-800 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-colors">
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div>
          <label class="block text-sm font-medium mb-1.5">角色 <span class="text-red-500">*</span></label>
          <select x-model="form.role"
            class="w-full px-4 py-2.5 border rounded-lg dark:bg-gray-800 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-colors">
            <option value="">请选择角色</option>
            <option value="admin">超级管理员</option>
            <option value="operator">运营主管</option>
            <option value="editor">内容编辑</option>
            <option value="viewer">普通用户</option>
          </select>
          <div x-show="errors.role" class="form-error" x-text="errors.role"></div>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1.5">状态</label>
          <select x-model="form.status"
            class="w-full px-4 py-2.5 border rounded-lg dark:bg-gray-800 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-colors">
            <option value="正常">正常</option>
            <option value="禁用">禁用</option>
          </select>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium mb-1.5">部门</label>
        <select x-model="form.dept"
          class="w-full px-4 py-2.5 border rounded-lg dark:bg-gray-800 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-colors">
          <option value="">请选择部门</option>
          <option value="tech">技术研发中心</option>
          <option value="frontend">前端开发组</option>
          <option value="backend">后端开发组</option>
          <option value="marketing">市场运营部</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium mb-1.5">备注</label>
        <textarea x-model="form.remark" rows="3" placeholder="请输入备注信息"
          class="w-full px-4 py-2.5 border rounded-lg dark:bg-gray-800 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-colors resize-none"></textarea>
      </div>

      <div class="flex justify-end gap-3 pt-2 border-t border-gray-200 dark:border-gray-700">
        <a href="/admin/user.html" class="px-5 py-2.5 border rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-sm">取消</a>
        <button type="submit" :disabled="submitting"
          class="px-5 py-2.5 bg-primary text-white rounded-lg hover:bg-primary/90 disabled:opacity-50 transition-colors text-sm flex items-center gap-2">
          <svg x-show="submitting" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
          <span x-text="submitting ? '提交中...' : '提交'"></span>
        </button>
      </div>
    </form>
  </div>
</div>

</body>
</html>
