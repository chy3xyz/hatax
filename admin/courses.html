<!-- layout: app-shell -->
<html>
<head>
  <title>课程管理</title>
</head>
<body>
<div id="page-content" class="pt-28 p-6"
 :class="$store.app.sidebarOpen ? 'lg:ml-64' : 'lg:ml-0'"
 :style="`transition: margin-left 0.3s ease`"
 x-data="coursesAdminPage">

 <nav class="flex items-center gap-1 text-sm text-gray-500 dark:text-gray-400 mb-6">
   <a href="/admin/dashboard.html" class="hover:text-primary">首页</a>
   <span class="mx-1">/</span>
   <span class="text-gray-700 dark:text-gray-200 font-medium">课程管理</span>
 </nav>

 <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
   <div>
     <h1 class="text-2xl font-bold">知识付费 · 课程</h1>
     <p class="text-sm text-gray-500 mt-1">配置视频课 / 文章课，用户用社区积分购买解锁</p>
   </div>
   <div class="flex flex-wrap gap-2">
     <input x-model="q" @keydown.enter="load()" type="search" placeholder="搜索标题…"
       class="px-3 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent">
     <select x-model="type" @change="load()" class="px-3 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent">
       <option value="">全部类型</option>
       <option value="video">视频课程</option>
       <option value="article">文章课程</option>
     </select>
     <select x-model="status" @change="load()" class="px-3 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent">
       <option value="">全部状态</option>
       <option value="published">已上架</option>
       <option value="draft">草稿</option>
       <option value="archived">归档</option>
     </select>
     <button type="button" @click="load()" class="px-3 py-2 border rounded-lg text-sm">搜索</button>
     <button type="button" @click="viewPurchases()" class="px-3 py-2 border rounded-lg text-sm">购买明细</button>
     <button type="button" @click="openCreate()" class="px-4 py-2 bg-primary text-white rounded-lg text-sm">+ 新建课程</button>
     <a href="/pages/courses.html" target="_blank" class="px-4 py-2 border rounded-lg text-sm">前台预览</a>
   </div>
 </div>

 <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
   <div class="bg-white dark:bg-gray-900 rounded-lg border p-4">
     <div class="text-xs text-gray-500">课程总数</div>
     <div class="text-xl font-bold mt-1" x-text="stats.total ?? 0"></div>
   </div>
   <div class="bg-white dark:bg-gray-900 rounded-lg border p-4">
     <div class="text-xs text-gray-500">已上架</div>
     <div class="text-xl font-bold mt-1" x-text="stats.published ?? 0"></div>
   </div>
   <div class="bg-white dark:bg-gray-900 rounded-lg border p-4">
     <div class="text-xs text-gray-500">销量</div>
     <div class="text-xl font-bold mt-1 text-primary" x-text="stats.sales ?? 0"></div>
   </div>
   <div class="bg-white dark:bg-gray-900 rounded-lg border p-4">
     <div class="text-xs text-gray-500">积分收入</div>
     <div class="text-xl font-bold mt-1 text-amber-500" x-text="stats.revenue ?? 0"></div>
   </div>
 </div>

 <div class="bg-white dark:bg-gray-900 rounded-lg border overflow-x-auto">
   <table class="w-full text-left">
     <thead class="bg-gray-50 dark:bg-gray-800/50 text-xs text-gray-500 uppercase">
       <tr>
         <th class="px-4 py-3">课程</th>
         <th class="px-4 py-3">类型</th>
         <th class="px-4 py-3">积分价</th>
         <th class="px-4 py-3">销量</th>
         <th class="px-4 py-3">状态</th>
         <th class="px-4 py-3">操作</th>
       </tr>
     </thead>
     <tbody>
       <template x-if="!rows.length">
         <tr><td colspan="6" class="px-4 py-8 text-center text-gray-400">暂无课程</td></tr>
       </template>
       <template x-for="c in rows" :key="c.id">
         <tr class="border-b border-gray-100 dark:border-gray-800">
           <td class="px-4 py-3">
             <div class="text-sm font-medium" x-text="c.title"></div>
             <div class="text-xs text-gray-400" x-text="c.slug + ' · ' + (c.lessonCount || 0) + ' 课时'"></div>
           </td>
           <td class="px-4 py-3 text-sm" x-text="c.typeLabel"></td>
           <td class="px-4 py-3 text-sm font-semibold text-primary" x-text="c.pricePoints === 0 ? '免费' : c.pricePoints"></td>
           <td class="px-4 py-3 text-sm" x-text="c.salesCount || 0"></td>
           <td class="px-4 py-3">
             <span class="text-xs px-2 py-0.5 rounded-full"
               :class="c.status==='published' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-600'"
               x-text="c.status"></span>
           </td>
           <td class="px-4 py-3 text-sm whitespace-nowrap">
             <a :href="'/pages/course.html?id=' + c.id" target="_blank" class="text-primary hover:underline mr-2">预览</a>
             <button type="button" @click="viewPurchases(c)" class="text-primary hover:underline mr-2">购买</button>
             <button type="button" @click="edit(c)" class="text-blue-500 hover:underline mr-2">编辑</button>
             <button type="button" @click="remove(c)" class="text-red-500 hover:underline">删除</button>
           </td>
         </tr>
       </template>
     </tbody>
   </table>
 </div>

 <div x-show="modalOpen" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4" style="display:none">
   <div class="absolute inset-0 bg-black/40" @click="modalOpen=false"></div>
   <div class="relative bg-white dark:bg-gray-900 rounded-xl border w-full max-w-3xl max-h-[90vh] overflow-y-auto p-6 shadow-xl">
     <h2 class="text-lg font-bold mb-4" x-text="form.id ? '编辑课程' : '新建课程'"></h2>
     <div class="space-y-3">
       <div>
         <label class="block text-sm mb-1">标题</label>
         <input x-model="form.title" class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent">
       </div>
       <div>
         <label class="block text-sm mb-1">副标题</label>
         <input x-model="form.subtitle" class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent">
       </div>
       <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
         <div>
           <label class="block text-sm mb-1">类型</label>
           <select x-model="form.type" class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent">
             <option value="video">视频课程</option>
             <option value="article">文章课程</option>
           </select>
         </div>
         <div>
           <label class="block text-sm mb-1">积分价格</label>
           <input type="number" min="0" x-model="form.pricePoints" class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent">
         </div>
         <div>
           <label class="block text-sm mb-1">状态</label>
           <select x-model="form.status" class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent">
             <option value="published">published</option>
             <option value="draft">draft</option>
             <option value="archived">archived</option>
           </select>
         </div>
         <div>
           <label class="block text-sm mb-1">排序</label>
           <input type="number" x-model="form.sort" class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent">
         </div>
       </div>
       <div class="grid grid-cols-2 gap-3">
         <div>
           <label class="block text-sm mb-1">Slug</label>
           <input x-model="form.slug" placeholder="可空自动生成" class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent">
         </div>
         <div>
           <label class="block text-sm mb-1">封面 URL</label>
           <input x-model="form.coverUrl" class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent">
         </div>
       </div>
       <div>
         <label class="block text-sm mb-1">摘要</label>
         <textarea x-model="form.summary" rows="2" class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent"></textarea>
       </div>
       <div>
         <label class="block text-sm mb-1">介绍（Markdown，购买前可见）</label>
         <textarea x-model="form.introMd" rows="4" class="w-full px-3 py-2 font-mono text-xs rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent"></textarea>
       </div>
       <div>
         <label class="block text-sm mb-1">购买后补充说明（Markdown）</label>
         <textarea x-model="form.bodyMd" rows="3" class="w-full px-3 py-2 font-mono text-xs rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent"></textarea>
       </div>

       <div class="border-t pt-4 dark:border-gray-800">
         <div class="flex items-center justify-between mb-2">
           <label class="text-sm font-medium">课时</label>
           <button type="button" @click="addLesson()" class="text-sm text-primary">+ 添加课时</button>
         </div>
         <template x-for="(l, i) in form.lessons" :key="i">
           <div class="mb-3 rounded-lg border border-gray-200 p-3 dark:border-gray-700 space-y-2">
             <div class="flex gap-2">
               <input x-model="l.title" placeholder="课时标题" class="flex-1 px-3 py-1.5 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent">
               <button type="button" @click="form.lessons.splice(i,1)" class="text-xs text-red-500 px-2">删</button>
             </div>
             <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
               <select x-model="l.contentType" class="px-2 py-1.5 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent">
                 <option value="video">视频</option>
                 <option value="article">文章</option>
               </select>
               <input type="number" x-model="l.sort" placeholder="排序" class="px-2 py-1.5 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent">
               <input type="number" x-model="l.durationMinutes" placeholder="时长(分)" class="px-2 py-1.5 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent">
               <label class="flex items-center gap-1 text-xs"><input type="checkbox" x-model="l.isFree"> 免费试看</label>
             </div>
             <input x-model="l.mediaUrl" placeholder="视频 URL（视频课时）" class="w-full px-2 py-1.5 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent" x-show="l.contentType==='video'">
             <textarea x-model="l.bodyMd" rows="3" placeholder="课时正文 Markdown" class="w-full px-2 py-1.5 font-mono text-xs rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent"></textarea>
           </div>
         </template>
         <p class="text-xs text-gray-400" x-show="!form.lessons.length">新建时可在此添加课时；编辑已有课程时保存会同步课时（按列表重建）。</p>
       </div>

       <div class="flex justify-end gap-2 pt-2">
         <button type="button" @click="modalOpen=false" class="px-4 py-2 border rounded-lg text-sm">取消</button>
         <button type="button" @click="save()" :disabled="saving" class="px-4 py-2 bg-primary text-white rounded-lg text-sm">保存</button>
       </div>
     </div>
   </div>
 </div>

 <div x-show="purchasesOpen" x-cloak class="fixed inset-0 z-50 flex justify-end" style="display:none">
   <div class="absolute inset-0 bg-black/40" @click="purchasesOpen=false"></div>
   <div class="relative w-full max-w-md bg-white dark:bg-gray-900 h-full overflow-y-auto p-6 shadow-xl border-l">
     <div class="flex items-center justify-between mb-4">
       <h2 class="text-lg font-bold">购买明细</h2>
       <button type="button" @click="purchasesOpen=false" class="text-sm text-gray-500">关闭</button>
     </div>
     <p class="text-sm text-gray-500 mb-4" x-text="purchasesTitle"></p>
     <template x-if="!purchases.length">
       <p class="text-sm text-gray-400 py-8 text-center">暂无购买记录</p>
     </template>
     <template x-for="p in purchases" :key="p.id">
       <div class="border-b border-gray-100 dark:border-gray-800 py-3 text-sm">
         <div class="font-medium" x-text="p.displayName + ' (@' + p.username + ')'"></div>
         <div class="text-xs text-gray-400 mt-1" x-show="!purchasesTitle || purchasesTitle==='全部购买记录'" x-text="p.courseTitle"></div>
         <div class="text-xs text-gray-500 mt-1">
           <span class="text-primary font-medium" x-text="p.pointsSpent + ' 积分'"></span>
           <span x-text="' · ' + (p.createdAt || '').slice(0,16)"></span>
         </div>
       </div>
     </template>
   </div>
 </div>
</div>
</body>
</html>
