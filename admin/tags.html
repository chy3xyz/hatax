<!-- layout: app-shell -->
<html>
<head>
  <title>标签管理</title>
</head>
<body>
<div id="page-content" class="pt-28 p-6"
 :class="$store.app.sidebarOpen ? 'lg:ml-64' : 'lg:ml-0'"
 :style="`transition: margin-left 0.3s ease`"
 x-data="tagsAdminPage">

 <nav class="flex items-center gap-1 text-sm text-gray-500 dark:text-gray-400 mb-6">
   <a href="/admin/dashboard.html" class="hover:text-primary">首页</a>
   <span class="mx-1">/</span>
   <span class="text-gray-700 dark:text-gray-200 font-medium">标签管理</span>
 </nav>

 <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
   <h1 class="text-2xl font-bold">标签管理</h1>
   <div class="flex gap-2">
     <div class="flex rounded-lg border border-gray-200 dark:border-gray-700 overflow-hidden text-sm">
       <button type="button" @click="tab='forum'" class="px-3 py-2"
         :class="tab==='forum' ? 'bg-primary text-white' : 'hover:bg-gray-50 dark:hover:bg-gray-800'">论坛标签</button>
       <button type="button" @click="tab='blog'" class="px-3 py-2"
         :class="tab==='blog' ? 'bg-primary text-white' : 'hover:bg-gray-50 dark:hover:bg-gray-800'">博客标签</button>
     </div>
     <button type="button" @click="openCreate()" class="px-4 py-2 bg-primary text-white rounded-lg text-sm">+ 新建</button>
   </div>
 </div>

 <div class="bg-white dark:bg-gray-900 rounded-lg border border-gray-200 dark:border-gray-700 overflow-x-auto">
   <table class="w-full text-left">
     <thead class="bg-gray-50 dark:bg-gray-800/50 text-xs text-gray-500 uppercase">
       <tr>
         <th class="px-4 py-3">名称</th>
         <th class="px-4 py-3">Slug</th>
         <th class="px-4 py-3">用量</th>
         <th class="px-4 py-3">操作</th>
       </tr>
     </thead>
     <tbody>
       <template x-for="t in (tab === 'forum' ? forumTags : blogTags)" :key="t.id">
         <tr class="border-b border-gray-100 dark:border-gray-800">
           <td class="px-4 py-3 text-sm">
             <span class="inline-flex items-center gap-2">
               <span x-show="tab==='forum'" class="w-2.5 h-2.5 rounded-full" :style="'background:' + (t.color || '#64748b')"></span>
               <span x-text="t.name"></span>
             </span>
           </td>
           <td class="px-4 py-3 text-sm text-gray-500" x-text="t.slug"></td>
           <td class="px-4 py-3 text-sm text-gray-500" x-text="tab==='forum' ? (t.topicCount || 0) : (t.postCount || 0)"></td>
           <td class="px-4 py-3 text-sm">
             <button type="button" @click="edit(t)" class="text-blue-500 hover:underline mr-3">编辑</button>
             <button type="button" @click="remove(t)" class="text-red-500 hover:underline">删除</button>
           </td>
         </tr>
       </template>
     </tbody>
   </table>
 </div>

 <div x-show="modalOpen" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4" style="display:none">
   <div class="absolute inset-0 bg-black/40" @click="modalOpen=false"></div>
   <div class="relative bg-white dark:bg-gray-900 rounded-xl border w-full max-w-md p-6 shadow-xl">
     <h2 class="text-lg font-bold mb-4" x-text="form.id ? '编辑标签' : '新建标签'"></h2>
     <div class="space-y-3">
       <div>
         <label class="block text-sm mb-1">名称</label>
         <input x-model="form.name" class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent">
       </div>
       <div>
         <label class="block text-sm mb-1">Slug</label>
         <input x-model="form.slug" class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent">
       </div>
       <div x-show="form.kind === 'forum'">
         <label class="block text-sm mb-1">颜色</label>
         <input type="color" x-model="form.color" class="h-10 w-full rounded-lg border">
       </div>
       <div>
         <label class="block text-sm mb-1">描述</label>
         <input x-model="form.description" class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent">
       </div>
       <div class="flex justify-end gap-2 pt-2">
         <button type="button" @click="modalOpen=false" class="px-4 py-2 border rounded-lg text-sm">取消</button>
         <button type="button" @click="save()" :disabled="saving" class="px-4 py-2 bg-primary text-white rounded-lg text-sm">保存</button>
       </div>
     </div>
   </div>
 </div>
</div>
</body>
</html>
