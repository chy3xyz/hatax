<!-- layout: app-shell -->
<html>
<head>
  <title>操作日志</title>
  
</head>
<body>
<div id="page-content" x-data class="pt-28 p-6"
 :class="$store.app.sidebarOpen ? 'lg:ml-64' : 'lg:ml-0'"
 :style="`transition: margin-left 0.3s ease; -webkit-transition: margin-left 0.3s ease;`"
 x-data="opLogPage()">
 <nav class="flex items-center gap-1 text-sm text-gray-500 dark:text-gray-400 overflow-x-auto mb-4" aria-label="Breadcrumb">
 <a href="/admin/dashboard.html" class="flex items-center gap-1 hover:text-primary transition-colors flex-shrink-0">
 <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
 <span class="hidden sm:inline">首页</span>
 </a>
 <template x-for="(crumb, i) in $store.app.breadcrumbs.slice(1)" :key="i">
 <div class="flex items-center gap-1 flex-shrink-0">
 <svg class="w-3.5 h-3.5 text-gray-300 dark:text-gray-600 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
 <a x-show="crumb.path && crumb.path !== '#'"
 :href="crumb.path"
 class="hover:text-primary transition-colors whitespace-nowrap"
 x-text="crumb.title"></a>
 <span x-show="!crumb.path || crumb.path === '#'"
 class="text-gray-700 dark:text-gray-200 font-medium whitespace-nowrap"
 x-text="crumb.title"></span>
 </div>
 </template>
 </nav>

 <div class="flex justify-between items-center mb-4">
 <div>
 <h1 class="text-2xl font-bold">操作日志</h1>
 <p class="text-sm text-gray-500 mt-1">记录所有用户在系统中的关键操作行为</p>
 </div>
 <div class="flex items-center gap-2">
 <button @click="exportLog()" class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary/90 transition-colors flex items-center gap-2">
 <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
 导出日志
 </button>
 </div>
 </div>

 <div class="bg-white dark:bg-gray-900 rounded-lg border border-gray-200 dark:border-gray-700 overflow-hidden">
 <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex flex-wrap gap-3 items-end">
 <div class="flex flex-col gap-1">
 <label class="text-xs text-gray-500">操作人</label>
 <input x-model="filterOperator" @keyup.enter="search()" placeholder="搜索操作人..." class="px-3 py-2 border rounded dark:bg-gray-800 dark:border-gray-600 w-36">
 </div>
 <div class="flex flex-col gap-1">
 <label class="text-xs text-gray-500">模块</label>
 <select x-model="filterModule" class="px-3 py-2 border rounded dark:bg-gray-800 dark:border-gray-600">
 <option value="">全部</option>
 <template x-for="m in modules" :key="m"><option :value="m" x-text="m"></option></template>
 </select>
 </div>
 <div class="flex flex-col gap-1">
 <label class="text-xs text-gray-500">操作类型</label>
 <select x-model="filterAction" class="px-3 py-2 border rounded dark:bg-gray-800 dark:border-gray-600">
 <option value="">全部</option>
 <template x-for="a in actions" :key="a"><option :value="a" x-text="a"></option></template>
 </select>
 </div>
 <div class="flex flex-col gap-1">
 <label class="text-xs text-gray-500">状态</label>
 <select x-model="filterStatus" class="px-3 py-2 border rounded dark:bg-gray-800 dark:border-gray-600">
 <option value="">全部</option>
 <option value="Success">成功</option>
 <option value="Warning">警告</option>
 <option value="Error">失败</option>
 </select>
 </div>
 <div class="flex flex-col gap-1">
 <label class="text-xs text-gray-500">开始日期</label>
 <input type="date" x-model="filterDateStart" class="px-3 py-2 border rounded dark:bg-gray-800 dark:border-gray-600">
 </div>
 <div class="flex flex-col gap-1">
 <label class="text-xs text-gray-500">结束日期</label>
 <input type="date" x-model="filterDateEnd" class="px-3 py-2 border rounded dark:bg-gray-800 dark:border-gray-600">
 </div>
 <div class="flex items-end gap-2">
 <button @click="search()" class="px-4 py-2 bg-primary text-white rounded hover:bg-primary/90 transition-colors">查询</button>
 <button @click="reset()" class="px-4 py-2 border rounded hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">重置</button>
 </div>
 </div>

 <div class="overflow-x-auto">
 <table class="w-full text-left text-sm">
 <thead class="bg-gray-50 dark:bg-gray-800">
 <tr class="border-b border-gray-200 dark:border-gray-700">
 <th class="px-4 py-3 text-gray-500 font-medium">ID</th>
 <th class="px-4 py-3 text-gray-500 font-medium">操作人</th>
 <th class="px-4 py-3 text-gray-500 font-medium">模块</th>
 <th class="px-4 py-3 text-gray-500 font-medium">操作类型</th>
 <th class="px-4 py-3 text-gray-500 font-medium">详情</th>
 <th class="px-4 py-3 text-gray-500 font-medium">IP地址</th>
 <th class="px-4 py-3 text-gray-500 font-medium">操作时间</th>
 <th class="px-4 py-3 text-gray-500 font-medium">耗时</th>
 <th class="px-4 py-3 text-gray-500 font-medium">状态</th>
 </tr>
 </thead>
 <tbody class="divide-y divide-gray-100 dark:divide-gray-800">
 <template x-for="row in paged" :key="row.id">
 <tr class="hover:bg-gray-50 dark:hover:bg-gray-800/50">
 <td class="px-4 py-3 text-gray-500" x-text="row.id"></td>
 <td class="px-4 py-3">
 <div class="flex items-center gap-2">
 <div class="w-7 h-7 rounded-full bg-primary/10 text-primary flex items-center justify-center text-xs font-medium" x-text="row.operator.charAt(0)"></div>
 <span class="font-medium" x-text="row.operator"></span>
 </div>
 </td>
 <td class="px-4 py-3">
 <span class="px-2 py-0.5 rounded text-xs bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-400" x-text="row.module"></span>
 </td>
 <td class="px-4 py-3">
 <span class="px-2 py-0.5 rounded text-xs bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-300" x-text="row.action"></span>
 </td>
 <td class="px-4 py-3 max-w-xs">
 <div class="text-gray-700 dark:text-gray-300 truncate" :title="row.detail" x-text="row.detail"></div>
 </td>
 <td class="px-4 py-3 text-gray-500 font-mono text-xs" x-text="row.ip"></td>
 <td class="px-4 py-3 text-gray-500" x-text="row.time"></td>
 <td class="px-4 py-3 text-gray-500" x-text="formatDuration(row.duration)"></td>
 <td class="px-4 py-3">
 <span class="px-2 py-0.5 rounded text-xs font-medium" :class="statusClass(row.status)" x-text="statusText(row.status)"></span>
 </td>
 </tr>
 </template>
 <tr x-show="paged.length === 0">
 <td colspan="9" class="px-4 py-12 text-center text-gray-400">
 <svg class="w-12 h-12 mx-auto mb-2 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
 <div>暂无日志记录</div>
 </td>
 </tr>
 </tbody>
 </table>
 </div>

 <div class="p-4 flex justify-between items-center border-t border-gray-200 dark:border-gray-700">
 <div class="flex items-center gap-4">
 <span class="text-sm text-gray-500">共 <span x-text="total"></span> 条记录</span>
 <div class="flex items-center gap-1 text-xs text-gray-400">
 <span class="inline-flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-green-500"></span>成功</span>
 <span class="inline-flex items-center gap-1 ml-2"><span class="w-2 h-2 rounded-full bg-yellow-500"></span>警告</span>
 <span class="inline-flex items-center gap-1 ml-2"><span class="w-2 h-2 rounded-full bg-red-500"></span>失败</span>
 </div>
 </div>
 <div class="flex gap-1">
 <button @click="currentPage = Math.max(1, currentPage-1); fetch()" :disabled="currentPage === 1" class="px-3 py-1 border rounded text-sm hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors disabled:opacity-50">上一页</button>
 <template x-for="p in Array.from({length: totalPages}, (_,i)=>i+1)" :key="p">
 <button @click="currentPage = p; fetch()" class="px-3 py-1 border rounded text-sm hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" :class="currentPage === p ? 'bg-primary text-white border-primary' : ''" x-text="p"></button>
 </template>
 <button @click="currentPage = Math.min(totalPages, currentPage+1); fetch()" :disabled="currentPage === totalPages" class="px-3 py-1 border rounded text-sm hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors disabled:opacity-50">下一页</button>
 </div>
 </div>
 </div>
</div>

</body>
</html>
