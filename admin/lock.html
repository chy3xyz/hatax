<!DOCTYPE html>
<html x-data="{}" :class="{ 'dark': $store.app.dark, 'sidebar-open': $store.app.sidebarOpen }">
<head>
 <script src="/theme-boot.js"></script>

 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛠️</text></svg>">
 <title>锁屏</title>
 <link rel="stylesheet" href="/style.css">
</head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden">

 <div class="fixed inset-0 -z-10">
 <div class="absolute inset-0 bg-gradient-to-br from-primary/20 via-transparent to-purple-500/10 dark:from-primary/10"></div>
 <div class="absolute inset-0 backdrop-blur-xl bg-white/40 dark:bg-gray-900/60"></div>
 <div class="absolute top-0 left-0 w-96 h-96 bg-primary/10 rounded-full blur-3xl -translate-x-1/2 -translate-y-1/2"></div>
 <div class="absolute bottom-0 right-0 w-96 h-96 bg-purple-500/10 rounded-full blur-3xl translate-x-1/2 translate-y-1/2"></div>
 </div>

 <div class="w-full max-w-sm mx-4">
 <div class="bg-white/80 dark:bg-gray-900/80 backdrop-blur-xl rounded-2xl shadow-2xl border border-gray-200/50 dark:border-gray-700/50 p-8">
 <div class="text-center mb-8">
 <div class="w-20 h-20 rounded-full bg-primary/20 text-primary flex items-center justify-center text-3xl font-bold mx-auto mb-4 ring-4 ring-primary/10">
 管
 </div>
 <h2 class="text-xl font-bold">管理员</h2>
 <p class="text-sm text-gray-500 mt-1">会话已锁定，请输入密码解锁</p>
 </div>

 <div x-data="{ password: '', showPwd: false, loading: false }" class="space-y-4">
 <div class="relative">
 <input
 :type="showPwd ? 'text' : 'password'"
 x-model="password"
 @keydown.enter="loading=true; setTimeout(() => { loading=false; if(password === '123456'){ sessionStorage.removeItem('hatax_locked'); location.href='/admin/dashboard.html' } else { Alpine.notify.error('密码错误'); password='' } }, 400)"
 placeholder="请输入解锁密码"
 class="w-full px-4 py-3 pr-12 border border-gray-200 dark:border-gray-600 rounded-xl bg-white/60 dark:bg-gray-800/60 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-colors text-center tracking-widest"
 autocomplete="current-password">
 <button type="button" @click="showPwd = !showPwd" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors">
 <svg x-show="!showPwd" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
 <svg x-show="showPwd" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path></svg>
 </button>
 </div>

 <button
 @click="loading=true; setTimeout(() => { loading=false; if(password === '123456'){ sessionStorage.removeItem('hatax_locked'); location.href='/admin/dashboard.html' } else { Alpine.notify.error('密码错误'); password='' } }, 400)"
 :disabled="loading"
 class="w-full py-3 bg-primary text-white rounded-xl font-medium hover:bg-primary/90 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
 <svg x-show="loading" class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
 <span x-text="loading ? '验证中...' : '解锁'"></span>
 </button>

 <div class="text-center pt-2">
 <a href="/admin/login.html" class="text-sm text-gray-400 hover:text-primary transition-colors">
 忘记密码？重新登录
 </a>
 </div>
 </div>

 <div class="mt-8 pt-6 border-t border-gray-200/50 dark:border-gray-700/50 text-center">
 <p class="text-xs text-gray-400">演示密码：<span class="font-mono bg-gray-100 dark:bg-gray-800 px-1.5 py-0.5 rounded">123456</span></p>
 </div>
 </div>

 <div class="text-center mt-6 text-xs text-gray-400">
 HatTax Admin © 2024 · MIT License
 </div>
 </div>

 <script type="module" src="/main.js"></script>
</body>
</html>
