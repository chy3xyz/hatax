<!DOCTYPE html>
<html>
<head>
 <script src="/theme-boot.js"></script>

 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <meta name="csrf-token" content="">
 <link rel="stylesheet" href="/style.css">
 <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛠️</text></svg>">
 <title>登录 - HatTax 管理后台</title>
</head>
<body class="min-h-screen bg-gradient-to-br from-primary/5 via-white to-primary/10 flex items-center justify-center p-4">
 <div class="w-full max-w-md" x-data="loginForm">
 <div class="text-center mb-8">
 <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary/10 mb-4">
 <svg class="w-8 h-8 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
 </div>
 <h1 class="text-2xl font-bold text-gray-900 dark:text-white">HatTax 管理后台</h1>
 <p class="text-gray-500 mt-1">仅供运营人员登录 · 社区请走论坛登录</p>
 </div>

 <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-xl border border-gray-200 dark:border-gray-700 p-8">
 <div x-show="error" class="mb-4 p-3 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg text-red-600 dark:text-red-400 text-sm" x-text="error" role="alert"></div>

 <form @submit.prevent="handleLogin" class="space-y-5" novalidate>
 <div>
 <label class="block text-sm font-medium mb-1.5 text-gray-700 dark:text-gray-300" for="login-username">用户名</label>
 <input
 id="login-username"
 type="text"
 autocomplete="username"
 x-model="username"
 placeholder="请输入用户名"
 class="w-full px-4 py-2.5 border rounded-lg dark:bg-gray-800 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-colors"
 :class="{ 'border-red-400': fieldErrors.username }"
 :aria-invalid="!!fieldErrors.username">
 <div x-show="fieldErrors.username" class="form-error" x-text="fieldErrors.username"></div>
 </div>

 <div>
 <label class="block text-sm font-medium mb-1.5 text-gray-700 dark:text-gray-300" for="login-password">密码</label>
 <input
 id="login-password"
 type="password"
 autocomplete="current-password"
 x-model="password"
 placeholder="请输入密码"
 class="w-full px-4 py-2.5 border rounded-lg dark:bg-gray-800 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-colors"
 :class="{ 'border-red-400': fieldErrors.password }"
 :aria-invalid="!!fieldErrors.password">
 <div x-show="fieldErrors.password" class="form-error" x-text="fieldErrors.password"></div>
 </div>

 <div class="flex items-center justify-between">
 <label class="flex items-center gap-2 cursor-pointer">
 <input type="checkbox" x-model="remember" class="w-4 h-4 rounded border-gray-300 text-primary focus:ring-primary">
 <span class="text-sm text-gray-600 dark:text-gray-400">记住我</span>
 </label>
 <a href="#" class="text-sm text-primary hover:underline">忘记密码？</a>
 </div>

 <button
 type="submit"
 :disabled="loading"
 class="w-full py-2.5 bg-primary text-white rounded-lg font-medium hover:bg-primary/90 disabled:opacity-50 disabled:cursor-not-allowed transition-colors flex items-center justify-center gap-2">
 <svg x-show="loading" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24" aria-hidden="true"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
 <span x-text="loading ? '登录中...' : '登录'"></span>
 </button>
 </form>

 <div class="mt-6 text-center text-sm text-gray-500 dark:text-gray-400">
 <span>测试账号: </span>
 <code class="text-primary">admin / 123456</code>
 </div>
 <p class="mt-3 text-center text-xs text-gray-400">
 论坛用户请前往 <a href="/pages/login.html" class="text-primary hover:underline">社区登录</a>
 </p>
 </div>

 <p class="text-center text-xs text-gray-400 mt-6">© 2026 HatTax. All rights reserved.</p>
 </div>

 <script type="module">
 import '/style.css'
 import Alpine from 'alpinejs'
 import { setToken, consumeRedirect, getToken } from '/src/auth.js'
 import { setCsrfToken, ensureCsrf } from '/src/htmx-setup.js'
 import { apiUrl } from '/src/api-base.js'

 if (getToken()) {
   location.replace(consumeRedirect('/admin/dashboard.html'))
 }

 ensureCsrf()

 Alpine.data('loginForm', () => ({
   username: localStorage.getItem('hatax_remember') || '',
   password: '',
   remember: !!localStorage.getItem('hatax_remember'),
   loading: false,
   error: '',
   fieldErrors: { username: '', password: '' },

   async handleLogin() {
     this.error = ''
     this.fieldErrors = { username: '', password: '' }

     if (!this.username.trim()) {
       this.fieldErrors.username = '请输入用户名'
       return
     }
     if (!this.password) {
       this.fieldErrors.password = '请输入密码'
       return
     }

     this.loading = true
     try {
       const res = await fetch(apiUrl('/api/auth/login'), {
         method: 'POST',
         credentials: 'include',
         headers: { 'Content-Type': 'application/json' },
         body: JSON.stringify({
           username: this.username.trim(),
           password: this.password,
         }),
       })
       const json = await res.json()
       if (json.code !== 0 || !json.data?.token) {
         this.error = json.msg || '用户名或密码错误'
         this.loading = false
         return
       }
       if (this.remember) {
         localStorage.setItem('hatax_remember', this.username.trim())
       } else {
         localStorage.removeItem('hatax_remember')
       }
       setToken(json.data.token)
       if (json.data.csrfToken) setCsrfToken(json.data.csrfToken)
       location.href = consumeRedirect('/admin/dashboard.html')
     } catch {
       this.error = '无法连接服务器，请确认已启动 Hono（npm run server）'
       this.loading = false
     }
   }
 }))

 window.Alpine = Alpine
 Alpine.start()
 </script>
</body>
</html>
