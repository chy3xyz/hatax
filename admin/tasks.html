<!-- layout: app-shell -->
<html>
<head>
  <title>任务管理</title>
</head>
<body>
<div id="page-content" class="pt-28 p-6"
 :class="$store.app.sidebarOpen ? 'lg:ml-64' : 'lg:ml-0'"
 :style="`transition: margin-left 0.3s ease`"
 x-data="tasksAdminPage">

 <nav class="flex items-center gap-1 text-sm text-gray-500 dark:text-gray-400 mb-6">
   <a href="/admin/dashboard.html" class="hover:text-primary">首页</a>
   <span class="mx-1">/</span>
   <span class="text-gray-700 dark:text-gray-200 font-medium">任务管理</span>
 </nav>

 <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
   <div>
     <h1 class="text-2xl font-bold">任务管理</h1>
     <p class="text-sm text-gray-500 mt-1">配置阅读 / 音视频 / 答题 / 发帖任务，完成可获积分</p>
   </div>
   <div class="flex flex-wrap gap-2">
     <input x-model="q" @keydown.enter="load()" type="search" placeholder="搜索标题…"
       class="px-3 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent">
     <select x-model="type" @change="load()" class="px-3 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent">
       <option value="">全部类型</option>
       <template x-for="t in types" :key="t.key">
         <option :value="t.key" x-text="t.label"></option>
       </template>
     </select>
     <select x-model="status" @change="load()" class="px-3 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent">
       <option value="">全部状态</option>
       <option value="active">进行中</option>
       <option value="draft">草稿</option>
       <option value="archived">归档</option>
     </select>
     <button type="button" @click="load()" class="px-3 py-2 border rounded-lg text-sm">搜索</button>
     <button type="button" @click="viewCompletions()" class="px-3 py-2 border rounded-lg text-sm">完成记录</button>
     <button type="button" @click="openCreate()" class="px-4 py-2 bg-primary text-white rounded-lg text-sm">+ 新建任务</button>
     <a href="/pages/tasks.html" target="_blank" class="px-4 py-2 border rounded-lg text-sm">前台预览</a>
   </div>
 </div>

 <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6">
   <div class="bg-white dark:bg-gray-900 rounded-lg border p-4">
     <div class="text-xs text-gray-500">任务总数</div>
     <div class="text-xl font-bold mt-1" x-text="stats.total ?? 0"></div>
   </div>
   <div class="bg-white dark:bg-gray-900 rounded-lg border p-4">
     <div class="text-xs text-gray-500">进行中</div>
     <div class="text-xl font-bold mt-1" x-text="stats.active ?? 0"></div>
   </div>
   <div class="bg-white dark:bg-gray-900 rounded-lg border p-4">
     <div class="text-xs text-gray-500">完成次数</div>
     <div class="text-xl font-bold mt-1 text-primary" x-text="stats.completions ?? 0"></div>
   </div>
 </div>

 <div class="bg-white dark:bg-gray-900 rounded-lg border overflow-x-auto">
   <table class="w-full text-left">
     <thead class="bg-gray-50 dark:bg-gray-800/50 text-xs text-gray-500 uppercase">
       <tr>
         <th class="px-4 py-3">任务</th>
         <th class="px-4 py-3">类型</th>
         <th class="px-4 py-3">积分</th>
         <th class="px-4 py-3">状态</th>
         <th class="px-4 py-3">操作</th>
       </tr>
     </thead>
     <tbody>
       <template x-if="!rows.length">
         <tr><td colspan="5" class="px-4 py-8 text-center text-gray-400">暂无任务</td></tr>
       </template>
       <template x-for="t in rows" :key="t.id">
         <tr class="border-b border-gray-100 dark:border-gray-800">
           <td class="px-4 py-3">
             <div class="text-sm font-medium" x-text="t.title"></div>
             <div class="text-xs text-gray-400" x-text="t.slug"></div>
           </td>
           <td class="px-4 py-3 text-sm" x-text="t.typeLabel"></td>
           <td class="px-4 py-3 text-sm font-semibold text-primary" x-text="'+' + t.rewardPoints"></td>
           <td class="px-4 py-3">
             <span class="text-xs px-2 py-0.5 rounded-full"
               :class="t.status==='active' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-600'"
               x-text="t.status"></span>
           </td>
           <td class="px-4 py-3 text-sm whitespace-nowrap">
             <a :href="'/pages/task.html?id=' + t.id" target="_blank" class="text-primary hover:underline mr-2">预览</a>
             <button type="button" @click="viewCompletions(t)" class="text-primary hover:underline mr-2">完成</button>
             <button type="button" @click="edit(t)" class="text-blue-500 hover:underline mr-2">编辑</button>
             <button type="button" @click="remove(t)" class="text-red-500 hover:underline">删除</button>
           </td>
         </tr>
       </template>
     </tbody>
   </table>
 </div>

 <div x-show="modalOpen" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4" style="display:none">
   <div class="absolute inset-0 bg-black/40" @click="modalOpen=false"></div>
   <div class="relative bg-white dark:bg-gray-900 rounded-xl border w-full max-w-2xl max-h-[90vh] overflow-y-auto p-6 shadow-xl">
     <h2 class="text-lg font-bold mb-4" x-text="form.id ? '编辑任务' : '新建任务'"></h2>
     <div class="space-y-3">
       <div>
         <label class="block text-sm mb-1">标题</label>
         <input x-model="form.title" class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent">
       </div>
       <div class="grid grid-cols-2 gap-3">
         <div>
           <label class="block text-sm mb-1">类型</label>
           <select x-model="form.type" class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent">
             <template x-for="t in types" :key="t.key">
               <option :value="t.key" x-text="t.label"></option>
             </template>
           </select>
         </div>
         <div>
           <label class="block text-sm mb-1">奖励积分</label>
           <input type="number" x-model="form.rewardPoints" class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent">
         </div>
       </div>
       <div class="grid grid-cols-3 gap-3">
         <div>
           <label class="block text-sm mb-1">Slug</label>
           <input x-model="form.slug" placeholder="可空" class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent">
         </div>
         <div>
           <label class="block text-sm mb-1">状态</label>
           <select x-model="form.status" class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent">
             <option value="active">active</option>
             <option value="draft">draft</option>
             <option value="archived">archived</option>
           </select>
         </div>
         <div>
           <label class="block text-sm mb-1">排序</label>
           <input type="number" x-model="form.sort" class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent">
         </div>
       </div>
       <div>
         <label class="block text-sm mb-1">描述</label>
         <textarea x-model="form.description" rows="2" class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent"></textarea>
       </div>
       <div>
         <label class="block text-sm mb-1">配置 JSON</label>
         <p class="text-xs text-gray-400 mb-1">read: url/minSeconds · video/audio: url/minPercent · quiz: passScore/questions · post: categorySlug/minTitleLen/minBodyLen</p>
         <textarea x-model="form.configText" rows="12" class="w-full px-3 py-2 font-mono text-xs rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent"></textarea>
       </div>
       <label class="flex items-center gap-2 text-sm"><input type="checkbox" x-model="form.repeatable"> 可重复完成</label>
       <div class="flex justify-end gap-2 pt-2">
         <button type="button" @click="modalOpen=false" class="px-4 py-2 border rounded-lg text-sm">取消</button>
         <button type="button" @click="save()" :disabled="saving" class="px-4 py-2 bg-primary text-white rounded-lg text-sm">保存</button>
       </div>
     </div>
   </div>
 </div>

 <div x-show="completionsOpen" x-cloak class="fixed inset-0 z-50 flex justify-end" style="display:none">
   <div class="absolute inset-0 bg-black/40" @click="completionsOpen=false"></div>
   <div class="relative w-full max-w-md bg-white dark:bg-gray-900 h-full overflow-y-auto p-6 shadow-xl border-l">
     <div class="flex items-center justify-between mb-4">
       <h2 class="text-lg font-bold">完成记录</h2>
       <button type="button" @click="completionsOpen=false" class="text-sm text-gray-500">关闭</button>
     </div>
     <p class="text-sm text-gray-500 mb-4" x-text="completionsTitle"></p>
     <template x-if="!completions.length">
       <p class="text-sm text-gray-400 py-8 text-center">暂无完成记录</p>
     </template>
     <template x-for="c in completions" :key="c.id">
       <div class="border-b border-gray-100 dark:border-gray-800 py-3 text-sm">
         <div class="font-medium" x-text="c.displayName + ' (@' + c.username + ')'"></div>
         <div class="text-xs text-gray-400 mt-1" x-show="completionsTitle==='全部任务完成记录'" x-text="c.taskTitle"></div>
         <div class="text-xs text-gray-500 mt-1">
           <span class="text-primary font-medium" x-text="'+' + c.rewardPoints + ' 积分'"></span>
           <span x-text="' · ' + (c.completedAt || '').slice(0,16)"></span>
         </div>
       </div>
     </template>
   </div>
 </div>
</div>
</body>
</html>
