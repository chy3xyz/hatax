<!-- layout: app-shell -->
<html>
<head>
  <title>仪表盘</title>
</head>
<body>
<div id="page-content" x-data="dashboardPage" class="pt-28 pb-8 p-6 animate-fade-in"
 :class="$store.app.sidebarOpen ? 'lg:ml-64' : 'lg:ml-0'"
 :style="`transition: margin-left 0.3s ease; -webkit-transition: margin-left 0.3s ease;`">
 <nav class="flex items-center gap-1 text-sm text-gray-500 dark:text-gray-400 overflow-x-auto" aria-label="Breadcrumb">
 <a href="/admin/dashboard.html" class="flex items-center gap-1 hover:text-primary transition-colors flex-shrink-0">
 <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
 <span class="hidden sm:inline">首页</span>
 </a>
 <template x-for="(crumb, i) in $store.app.breadcrumbs.slice(1)" :key="i">
 <div class="flex items-center gap-1 flex-shrink-0">
 <svg class="w-3.5 h-3.5 text-gray-300 dark:text-gray-600 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
 <a x-show="crumb.path && crumb.path !== '#'"
 :href="crumb.path"
 class="hover:text-primary transition-colors whitespace-nowrap"
 x-text="crumb.title"></a>
 <span x-show="!crumb.path || crumb.path === '#'"
 class="text-gray-700 dark:text-gray-200 font-medium whitespace-nowrap"
 x-text="crumb.title"></span>
 </div>
 </template>
</nav>


 <div class="mb-6 flex justify-between items-start">
 <div>
 <h1 class="text-2xl font-bold">仪表盘</h1>
 <p class="text-gray-500 text-sm mt-1">欢迎回来，管理员！以下是系统概览。</p>
 </div>
 <div class="flex gap-2">
 <button onclick="window._pageRefreshFns['dashboard'] ? window._pageRefreshFns['dashboard']() : window.refreshPage()" class="px-3 py-1.5 border rounded-lg text-sm hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors flex items-center gap-1.5">
 <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
 刷新
 </button>
 <button onclick="Alpine.store('app').drawerOpen = true" class="px-3 py-1.5 bg-primary text-white rounded-lg text-sm hover:bg-primary/90 transition-colors flex items-center gap-1.5">
 <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
 导出报告
 </button>
 </div>
 </div>

 <div x-data="{ activeTab: 'analytics' }" class="space-y-6">
 <div class="flex items-center gap-1 border-b border-gray-200 dark:border-gray-700 -mx-6 px-6">
 <button @click="activeTab = 'analytics'"
 class="relative px-4 py-2.5 text-sm font-medium transition-colors border-b-2 -mb-px"
 :class="activeTab === 'analytics' ? 'text-primary border-primary' : 'text-gray-500 border-transparent hover:text-gray-700 dark:hover:text-gray-300'">
 <span class="flex items-center gap-1.5">
 <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
 数据分析
 </span>
 </button>
 <button @click="activeTab = 'workspace'"
 class="relative px-4 py-2.5 text-sm font-medium transition-colors border-b-2 -mb-px"
 :class="activeTab === 'workspace' ? 'text-primary border-primary' : 'text-gray-500 border-transparent hover:text-gray-700 dark:hover:text-gray-300'">
 <span class="flex items-center gap-1.5">
 <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
 工作台
 </span>
 </button>
 </div>

 <div x-show="activeTab === 'analytics'" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 translate-y-1" x-transition:enter-end="opacity-100 translate-y-0">
 <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 mb-6">
 <div class="bg-white dark:bg-gray-900 rounded-xl border p-5 hover:shadow-md transition-shadow">
 <div class="flex items-center justify-between">
 <div>
 <div class="text-sm text-gray-500 mb-1">社区会员</div>
 <div class="text-2xl font-bold" x-text="loading ? '…' : (forum.members ?? 0)"></div>
 <div class="text-xs text-gray-400 mt-1">注册社区账号</div>
 </div>
 <div class="w-12 h-12 rounded-xl bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center">
 <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
 </div>
 </div>
 </div>
 <div class="bg-white dark:bg-gray-900 rounded-xl border p-5 hover:shadow-md transition-shadow">
 <div class="flex items-center justify-between">
 <div>
 <div class="text-sm text-gray-500 mb-1">帖子数</div>
 <div class="text-2xl font-bold text-green-500" x-text="loading ? '…' : (forum.topics ?? 0)"></div>
 <div class="text-xs text-gray-400 mt-1">待解答 <span x-text="forum.unanswered ?? 0"></span></div>
 </div>
 <div class="w-12 h-12 rounded-xl bg-green-100 dark:bg-green-900/30 flex items-center justify-center">
 <svg class="w-6 h-6 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h8M8 14h5M21 12a9 9 0 11-3.2-6.9L21 5v7z"></path></svg>
 </div>
 </div>
 </div>
 <div class="bg-white dark:bg-gray-900 rounded-xl border p-5 hover:shadow-md transition-shadow">
 <div class="flex items-center justify-between">
 <div>
 <div class="text-sm text-gray-500 mb-1">已发布博客</div>
 <div class="text-2xl font-bold" x-text="loading ? '…' : (blog.posts ?? 0)"></div>
 <div class="text-xs text-gray-400 mt-1">社区 <span x-text="blog.communityWorks ?? 0"></span> · 官方 <span x-text="blog.adminPosts ?? 0"></span></div>
 </div>
 <div class="w-12 h-12 rounded-xl bg-orange-100 dark:bg-orange-900/30 flex items-center justify-center">
 <svg class="w-6 h-6 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
 </div>
 </div>
 </div>
 <div class="bg-white dark:bg-gray-900 rounded-xl border p-5 hover:shadow-md transition-shadow">
 <div class="flex items-center justify-between">
 <div>
 <div class="text-sm text-gray-500 mb-1">博客阅读</div>
 <div class="text-2xl font-bold" x-text="loading ? '…' : (blog.views ?? 0)"></div>
 <div class="text-xs text-gray-400 mt-1">回复 <span x-text="forum.replies ?? 0"></span> · 草稿 <span x-text="blog.drafts ?? 0"></span></div>
 </div>
 <div class="w-12 h-12 rounded-xl bg-violet-100 dark:bg-violet-900/30 flex items-center justify-center">
 <svg class="w-6 h-6 text-violet-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
 </div>
 </div>
 </div>
 </div>


 <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 mb-6">
 <div class="bg-white dark:bg-gray-900 rounded-xl border p-5 hover:shadow-md transition-shadow">
 <div class="flex items-center justify-between">
 <div>
 <div class="text-sm text-gray-500 mb-1">课程销量</div>
 <div class="text-2xl font-bold" x-text="loading ? '…' : (courses.sales ?? 0)"></div>
 <div class="text-xs text-gray-400 mt-1">上架 <span x-text="courses.published ?? 0"></span> · 积分收入 <span x-text="courses.revenue ?? 0"></span></div>
 </div>
 <div class="w-12 h-12 rounded-xl bg-cyan-100 dark:bg-cyan-900/30 flex items-center justify-center">
 <svg class="w-6 h-6 text-cyan-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
 </div>
 </div>
 </div>
 <div class="bg-white dark:bg-gray-900 rounded-xl border p-5 hover:shadow-md transition-shadow">
 <div class="flex items-center justify-between">
 <div>
 <div class="text-sm text-gray-500 mb-1">活动报名</div>
 <div class="text-2xl font-bold text-amber-500" x-text="loading ? '…' : (events.signups ?? 0)"></div>
 <div class="text-xs text-gray-400 mt-1">已发布活动 <span x-text="events.published ?? 0"></span></div>
 </div>
 <div class="w-12 h-12 rounded-xl bg-amber-100 dark:bg-amber-900/30 flex items-center justify-center">
 <svg class="w-6 h-6 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
 </div>
 </div>
 </div>
 <div class="bg-white dark:bg-gray-900 rounded-xl border p-5 hover:shadow-md transition-shadow">
 <div class="flex items-center justify-between">
 <div>
 <div class="text-sm text-gray-500 mb-1">任务完成</div>
 <div class="text-2xl font-bold text-emerald-500" x-text="loading ? '…' : (tasks.completions ?? 0)"></div>
 <div class="text-xs text-gray-400 mt-1">进行中任务 <span x-text="tasks.active ?? 0"></span></div>
 </div>
 <div class="w-12 h-12 rounded-xl bg-emerald-100 dark:bg-emerald-900/30 flex items-center justify-center">
 <svg class="w-6 h-6 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
 </div>
 </div>
 </div>
 <div class="bg-white dark:bg-gray-900 rounded-xl border p-5 hover:shadow-md transition-shadow">
 <div>
 <div class="text-sm text-gray-500 mb-2">运营入口</div>
 <div class="text-sm font-medium space-y-1">
 <a href="/admin/courses.html" class="block text-primary hover:underline">课程管理 →</a>
 <a href="/admin/events.html" class="block text-primary hover:underline">活动管理 →</a>
 <a href="/admin/tasks.html" class="block text-primary hover:underline">任务管理 →</a>
 </div>
 </div>
 </div>
 </div>

 <div class="grid grid-cols-1 lg:grid-cols-2 gap-5 mb-6">
 <div class="bg-white dark:bg-gray-900 rounded-xl border p-5">
 <div class="flex items-center justify-between mb-4">
 <h3 class="font-semibold">最新帖子</h3>
 <a href="/admin/forum.html" class="text-sm text-primary">管理</a>
 </div>
 <template x-if="!(forum.latest || []).length">
 <p class="text-sm text-gray-400 py-6 text-center">暂无帖子</p>
 </template>
 <template x-for="t in (forum.latest || [])" :key="'l'+t.id">
 <a :href="'/pages/forum-topic.html?id=' + t.id" target="_blank" class="flex items-start justify-between gap-3 py-2.5 border-b border-gray-100 dark:border-gray-800 last:border-0 hover:bg-gray-50 dark:hover:bg-gray-800/40 -mx-2 px-2 rounded">
 <div class="min-w-0">
 <p class="text-sm font-medium truncate" x-text="t.title"></p>
 <p class="text-xs text-gray-400 mt-0.5" x-text="(t.category_name || t.categoryName || '') + ' · ' + (t.author_name || t.authorName || '')"></p>
 </div>
 <span class="text-xs text-gray-400 shrink-0" x-text="(t.reply_count ?? t.replyCount ?? 0) + ' 回复'"></span>
 </a>
 </template>
 </div>
 <div class="bg-white dark:bg-gray-900 rounded-xl border p-5">
 <div class="flex items-center justify-between mb-4">
 <h3 class="font-semibold">热门帖子</h3>
 <a href="/admin/members.html" class="text-sm text-primary">会员</a>
 </div>
 <template x-if="!(forum.hot || []).length">
 <p class="text-sm text-gray-400 py-6 text-center">暂无数据</p>
 </template>
 <template x-for="t in (forum.hot || [])" :key="'h'+t.id">
 <a :href="'/pages/forum-topic.html?id=' + t.id" target="_blank" class="flex items-start justify-between gap-3 py-2.5 border-b border-gray-100 dark:border-gray-800 last:border-0 hover:bg-gray-50 dark:hover:bg-gray-800/40 -mx-2 px-2 rounded">
 <div class="min-w-0">
 <p class="text-sm font-medium truncate" x-text="t.title"></p>
 <p class="text-xs text-gray-400 mt-0.5" x-text="(t.author_name || t.authorName || '')"></p>
 </div>
 <span class="text-xs text-gray-400 shrink-0" x-text="(t.like_count ?? t.likeCount ?? 0) + ' 赞'"></span>
 </a>
 </template>
 </div>
 </div>

 <div class="bg-white dark:bg-gray-900 rounded-xl border p-5">
 <div class="flex items-center justify-between mb-4">
 <h3 class="font-semibold">内容运营捷径</h3>
 </div>
 <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3">
 <a href="/admin/blog.html" class="flex flex-col items-center gap-2 p-4 border rounded-lg hover:border-primary hover:bg-primary/5 transition-colors">
 <span class="text-sm font-medium">博客</span>
 <span class="text-xs text-gray-400" x-text="(blog.posts ?? 0) + ' 篇'"></span>
 </a>
 <a href="/admin/forum.html" class="flex flex-col items-center gap-2 p-4 border rounded-lg hover:border-primary hover:bg-primary/5 transition-colors">
 <span class="text-sm font-medium">论坛</span>
 <span class="text-xs text-gray-400" x-text="(forum.topics ?? 0) + ' 帖'"></span>
 </a>
 <a href="/admin/courses.html" class="flex flex-col items-center gap-2 p-4 border rounded-lg hover:border-primary hover:bg-primary/5 transition-colors">
 <span class="text-sm font-medium">课程</span>
 <span class="text-xs text-gray-400" x-text="(courses.sales ?? 0) + ' 单'"></span>
 </a>
 <a href="/admin/events.html" class="flex flex-col items-center gap-2 p-4 border rounded-lg hover:border-primary hover:bg-primary/5 transition-colors">
 <span class="text-sm font-medium">活动</span>
 <span class="text-xs text-gray-400" x-text="(events.signups ?? 0) + ' 报名'"></span>
 </a>
 <a href="/admin/tasks.html" class="flex flex-col items-center gap-2 p-4 border rounded-lg hover:border-primary hover:bg-primary/5 transition-colors">
 <span class="text-sm font-medium">任务</span>
 <span class="text-xs text-gray-400" x-text="(tasks.completions ?? 0) + ' 完成'"></span>
 </a>
 <a href="/admin/members.html" class="flex flex-col items-center gap-2 p-4 border rounded-lg hover:border-primary hover:bg-primary/5 transition-colors">
 <span class="text-sm font-medium">会员</span>
 <span class="text-xs text-gray-400" x-text="(forum.members ?? 0) + ' 人'"></span>
 </a>
 </div>
 </div>
 </div>

 <div x-show="activeTab === 'workspace'" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 translate-y-1" x-transition:enter-end="opacity-100 translate-y-0" class="space-y-6">
 <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
 <div class="lg:col-span-2 bg-white dark:bg-gray-900 rounded-xl border overflow-hidden">
 <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
 <h3 class="font-semibold">最新操作日志</h3>
 <a href="/admin/op-log.html" class="text-sm text-primary hover:underline">查看更多</a>
 </div>
 <div class="divide-y divide-gray-100 dark:divide-gray-800">
 <template x-if="!ops.length">
 <p class="text-sm text-gray-400 py-10 text-center">暂无操作记录</p>
 </template>
 <template x-for="op in ops" :key="op.id">
 <div class="flex items-start gap-3 p-4 hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors">
 <div class="w-8 h-8 rounded-full bg-primary/10 text-primary flex items-center justify-center text-sm flex-shrink-0" x-text="(op.operator || '?').slice(0,1)"></div>
 <div class="flex-1 min-w-0">
 <div class="text-sm"><span class="font-medium" x-text="op.operator"></span>
 <span class="text-gray-500" x-text="' ' + (op.action || '') + ' · '"></span>
 <span class="text-primary" x-text="op.module"></span>
 <span class="text-gray-500" x-text="op.detail ? (' · ' + op.detail) : ''"></span>
 </div>
 <div class="text-xs text-gray-400 mt-0.5" x-text="op.time || op.createdAt || ''"></div>
 </div>
 <span class="px-2 py-0.5 text-xs rounded"
 :class="(op.status || '').toLowerCase() === 'success' ? 'bg-green-50 text-green-600 dark:bg-green-900/20' : 'bg-gray-100 text-gray-500'"
 x-text="op.status || '—'"></span>
 </div>
 </template>
 </div>
 </div>

 <div class="space-y-6">
 <div class="bg-white dark:bg-gray-900 rounded-xl border overflow-hidden">
 <div class="p-4 border-b border-gray-200 dark:border-gray-700">
 <h3 class="font-semibold">待关注</h3>
 </div>
 <div class="divide-y divide-gray-100 dark:divide-gray-800">
 <a href="/admin/forum.html" class="flex items-center gap-3 p-4 hover:bg-gray-50 dark:hover:bg-gray-800/50">
 <div class="flex-1">
 <div class="text-sm">待解答帖子</div>
 <div class="text-xs text-gray-400" x-text="(forum.unanswered ?? 0) + ' 项'"></div>
 </div>
 </a>
 <a href="/admin/blog.html" class="flex items-center gap-3 p-4 hover:bg-gray-50 dark:hover:bg-gray-800/50">
 <div class="flex-1">
 <div class="text-sm">博客草稿</div>
 <div class="text-xs text-gray-400" x-text="(blog.drafts ?? 0) + ' 篇'"></div>
 </div>
 </a>
 <a href="/admin/events.html" class="flex items-center gap-3 p-4 hover:bg-gray-50 dark:hover:bg-gray-800/50">
 <div class="flex-1">
 <div class="text-sm">活动报名总数</div>
 <div class="text-xs text-gray-400" x-text="(events.signups ?? 0) + ' 人'"></div>
 </div>
 </a>
 </div>
 </div>

 <div class="bg-white dark:bg-gray-900 rounded-xl border overflow-hidden">
 <div class="p-4 border-b border-gray-200 dark:border-gray-700">
 <h3 class="font-semibold">快捷入口</h3>
 </div>
 <div class="p-4 grid grid-cols-2 gap-3">
 <a href="/admin/courses.html" class="flex items-center gap-3 p-3 border rounded-lg hover:border-primary transition-all"><span class="text-sm font-medium">课程</span></a>
 <a href="/admin/events.html" class="flex items-center gap-3 p-3 border rounded-lg hover:border-primary transition-all"><span class="text-sm font-medium">活动</span></a>
 <a href="/admin/tasks.html" class="flex items-center gap-3 p-3 border rounded-lg hover:border-primary transition-all"><span class="text-sm font-medium">任务</span></a>
 <a href="/admin/members.html" class="flex items-center gap-3 p-3 border rounded-lg hover:border-primary transition-all"><span class="text-sm font-medium">会员</span></a>
 </div>
 </div>
 </div>
 </div>
 </div>
 </div>
 </div>
</div>
</body>
</html>
