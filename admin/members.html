<!-- layout: app-shell -->
<html>
<head>
  <title>社区会员</title>
</head>
<body>
<div id="page-content" class="pt-28 p-6"
 :class="$store.app.sidebarOpen ? 'lg:ml-64' : 'lg:ml-0'"
 :style="`transition: margin-left 0.3s ease`"
 x-data="membersAdminPage">

 <nav class="flex items-center gap-1 text-sm text-gray-500 dark:text-gray-400 mb-6" aria-label="Breadcrumb">
   <a href="/admin/dashboard.html" class="hover:text-primary">首页</a>
   <span class="mx-1">/</span>
   <span class="text-gray-700 dark:text-gray-200 font-medium">社区会员</span>
 </nav>

 <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
   <div>
     <h1 class="text-2xl font-bold">社区会员</h1>
     <p class="text-sm text-gray-500 mt-1">管理前台社区账号（独立于后台员工）</p>
   </div>
   <div class="flex flex-wrap gap-2">
     <input x-model="q" @keydown.enter="load()" type="search" placeholder="搜索用户名/昵称…"
       class="px-3 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent">
     <select x-model="status" @change="load()" class="px-3 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent">
       <option value="">全部状态</option>
       <option value="active">正常</option>
       <option value="disabled">禁用</option>
     </select>
     <button type="button" @click="load()" class="px-4 py-2 bg-primary text-white rounded-lg text-sm">搜索</button>
   </div>
 </div>

 <div class="bg-white dark:bg-gray-900 rounded-lg border border-gray-200 dark:border-gray-700 overflow-x-auto">
   <table class="w-full text-left">
     <thead class="bg-gray-50 dark:bg-gray-800/50 text-xs text-gray-500 uppercase">
       <tr>
         <th class="px-4 py-3">会员</th>
         <th class="px-4 py-3">积分</th>
         <th class="px-4 py-3">博客/帖子/回复</th>
         <th class="px-4 py-3">状态</th>
         <th class="px-4 py-3">加入时间</th>
         <th class="px-4 py-3">操作</th>
       </tr>
     </thead>
     <tbody>
       <template x-if="!rows.length">
         <tr><td colspan="6" class="px-4 py-8 text-center text-gray-400">暂无会员</td></tr>
       </template>
       <template x-for="m in rows" :key="m.id">
         <tr class="border-b border-gray-100 dark:border-gray-800">
           <td class="px-4 py-3">
             <div class="text-sm font-medium" x-text="m.displayName"></div>
             <div class="text-xs text-gray-400">@<span x-text="m.username"></span></div>
           </td>
           <td class="px-4 py-3 text-sm font-semibold text-primary" x-text="m.points"></td>
           <td class="px-4 py-3 text-sm text-gray-500"
             x-text="(m.stats?.works ?? 0) + ' / ' + (m.stats?.topics ?? 0) + ' / ' + (m.stats?.replies ?? 0)"></td>
           <td class="px-4 py-3">
             <span class="text-xs px-2 py-0.5 rounded-full"
               :class="m.status === 'active' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-600'"
               x-text="m.status === 'active' ? '正常' : '禁用'"></span>
           </td>
           <td class="px-4 py-3 text-sm text-gray-500" x-text="(m.createdAt || '').slice(0,10)"></td>
           <td class="px-4 py-3 text-sm whitespace-nowrap">
             <a :href="'/pages/user.html?id=' + m.id" target="_blank" class="text-primary hover:underline mr-2">主页</a>
             <button type="button" @click="openHistory(m)" class="text-primary hover:underline mr-2">流水</button>
             <button type="button" @click="openPoints(m)" class="text-blue-500 hover:underline mr-2">调整</button>
             <button type="button" @click="toggleStatus(m)" class="hover:underline"
               :class="m.status === 'active' ? 'text-red-500' : 'text-green-600'"
               x-text="m.status === 'active' ? '禁用' : '启用'"></button>
           </td>
         </tr>
       </template>
     </tbody>
   </table>
 </div>
 <p class="mt-3 text-xs text-gray-400">共 <span x-text="total"></span> 人</p>

 <div x-show="pointsOpen" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4" style="display:none">
   <div class="absolute inset-0 bg-black/40" @click="pointsOpen=false"></div>
   <div class="relative bg-white dark:bg-gray-900 rounded-xl border w-full max-w-md p-6 shadow-xl">
     <h2 class="text-lg font-bold mb-4">调整积分 · @<span x-text="pointsForm.username"></span></h2>
     <div class="space-y-3">
       <div>
         <label class="block text-sm mb-1">变动值（可为负）</label>
         <input type="number" x-model="pointsForm.delta" class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent">
       </div>
       <div>
         <label class="block text-sm mb-1">原因</label>
         <input x-model="pointsForm.reason" class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent">
       </div>
       <div class="flex justify-end gap-2 pt-2">
         <button type="button" @click="pointsOpen=false" class="px-4 py-2 border rounded-lg text-sm">取消</button>
         <button type="button" @click="savePoints()" class="px-4 py-2 bg-primary text-white rounded-lg text-sm">确认</button>
       </div>
     </div>
   </div>
 </div>

 <div x-show="historyOpen" x-cloak class="fixed inset-0 z-50 flex justify-end" style="display:none">
   <div class="absolute inset-0 bg-black/40" @click="historyOpen=false"></div>
   <div class="relative w-full max-w-md bg-white dark:bg-gray-900 h-full overflow-y-auto p-6 shadow-xl border-l">
     <div class="flex items-center justify-between mb-4">
       <h2 class="text-lg font-bold">积分流水</h2>
       <button type="button" @click="historyOpen=false" class="text-sm text-gray-500">关闭</button>
     </div>
     <p class="text-sm text-gray-500 mb-1" x-text="historyMember ? ('@' + historyMember.username) : ''"></p>
     <p class="text-sm mb-4">当前积分 <span class="font-semibold text-primary" x-text="historyPoints"></span></p>
     <template x-if="!historyLogs.length">
       <p class="text-sm text-gray-400 py-8 text-center">暂无流水</p>
     </template>
     <template x-for="log in historyLogs" :key="log.id">
       <div class="border-b border-gray-100 dark:border-gray-800 py-3 text-sm">
         <div class="flex justify-between gap-2">
           <span class="font-medium" :class="log.delta >= 0 ? 'text-green-600' : 'text-red-500'"
             x-text="(log.delta >= 0 ? '+' : '') + log.delta"></span>
           <span class="text-xs text-gray-400" x-text="(log.createdAt || '').slice(0,16)"></span>
         </div>
         <div class="text-xs text-gray-500 mt-1" x-text="log.reason || ''"></div>
       </div>
     </template>
   </div>
 </div>
</div>
</body>
</html>
