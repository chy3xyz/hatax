<!-- layout: app-shell -->
<html>
<head>
  <title>个人中心</title>
  
</head>
<body>
<div id="page-content" x-data class="pt-28 p-6"
 :class="$store.app.sidebarOpen ? 'lg:ml-64' : 'lg:ml-0'"
 :style="`transition: margin-left 0.3s ease; -webkit-transition: margin-left 0.3s ease;`">
 <nav class="flex items-center gap-1 text-sm text-gray-500 dark:text-gray-400 overflow-x-auto" aria-label="Breadcrumb">
 <a href="/admin/dashboard.html" class="flex items-center gap-1 hover:text-primary transition-colors flex-shrink-0">
 <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
 <span class="hidden sm:inline">首页</span>
 </a>
 <template x-for="(crumb, i) in $store.app.breadcrumbs.slice(1)" :key="i">
 <div class="flex items-center gap-1 flex-shrink-0">
 <svg class="w-3.5 h-3.5 text-gray-300 dark:text-gray-600 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
 <a x-show="crumb.path && crumb.path !== '#'"
 :href="crumb.path"
 class="hover:text-primary transition-colors whitespace-nowrap"
 x-text="crumb.title"></a>
 <span x-show="!crumb.path || crumb.path === '#'"
 class="text-gray-700 dark:text-gray-200 font-medium whitespace-nowrap"
 x-text="crumb.title"></span>
 </div>
 </template>
</nav>


 <div class="flex justify-between items-center mb-6">
 <h1 class="text-2xl font-bold">个人中心</h1>
 </div>

 <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
 <div class="lg:col-span-1">
 <div class="bg-white dark:bg-gray-900 rounded-lg border border-gray-200 dark:border-gray-700 p-6 text-center">
 <div class="w-20 h-20 rounded-full bg-primary/20 text-primary flex items-center justify-center text-3xl font-bold mx-auto mb-4">管</div>
 <h3 class="font-semibold text-lg">管理员</h3>
 <p class="text-gray-500 text-sm mt-1">超级管理员</p>
 <div class="mt-4 pt-4 border-t border-gray-200 dark:border-gray-700 text-left text-sm space-y-2">
 <div class="flex justify-between"><span class="text-gray-500">部门</span><span>技术部</span></div>
 <div class="flex justify-between"><span class="text-gray-500">邮箱</span><span>admin@hatax.com</span></div>
 <div class="flex justify-between"><span class="text-gray-500">手机</span><span>138****8888</span></div>
 <div class="flex justify-between"><span class="text-gray-500">注册时间</span><span>2024-01-01</span></div>
 </div>
 </div>
 </div>

 <div class="lg:col-span-2 space-y-6">
 <div class="bg-white dark:bg-gray-900 rounded-lg border border-gray-200 dark:border-gray-700">
 <div class="p-4 border-b border-gray-200 dark:border-gray-700">
 <div class="flex gap-4">
 <button class="pb-2 border-b-2 border-primary text-primary font-medium text-sm" id="tab-basic">基本资料</button>
 <button class="pb-2 border-b-2 border-transparent text-gray-500 hover:text-gray-700 text-sm" id="tab-security">安全设置</button>
 </div>
 </div>
 <div class="p-6">
 <div id="panel-basic" class="space-y-5">
 <div>
 <label class="block text-sm font-medium mb-1.5">用户名</label>
 <input type="text" value="admin" class="w-full px-4 py-2.5 border rounded-lg dark:bg-gray-800 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-colors">
 </div>
 <div>
 <label class="block text-sm font-medium mb-1.5">邮箱</label>
 <input type="email" value="admin@hatax.com" class="w-full px-4 py-2.5 border rounded-lg dark:bg-gray-800 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-colors">
 </div>
 <div>
 <label class="block text-sm font-medium mb-1.5">手机号</label>
 <input type="tel" value="13812348888" class="w-full px-4 py-2.5 border rounded-lg dark:bg-gray-800 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-colors">
 </div>
 <div>
 <label class="block text-sm font-medium mb-1.5">个人简介</label>
 <textarea rows="3" placeholder="介绍一下自己" class="w-full px-4 py-2.5 border rounded-lg dark:bg-gray-800 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-colors resize-none"></textarea>
 </div>
 <div class="flex justify-end">
 <button onclick="Alpine.message.success('资料更新成功')" class="px-6 py-2.5 bg-primary text-white rounded-lg hover:bg-primary/90 transition-colors">保存</button>
 </div>
 </div>
 <div id="panel-security" class="space-y-5 hidden">
 <div>
 <label class="block text-sm font-medium mb-1.5">当前密码</label>
 <input type="password" placeholder="请输入当前密码" class="w-full px-4 py-2.5 border rounded-lg dark:bg-gray-800 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-colors">
 </div>
 <div>
 <label class="block text-sm font-medium mb-1.5">新密码</label>
 <input type="password" placeholder="请输入新密码" class="w-full px-4 py-2.5 border rounded-lg dark:bg-gray-800 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-colors">
 </div>
 <div>
 <label class="block text-sm font-medium mb-1.5">确认密码</label>
 <input type="password" placeholder="请再次输入新密码" class="w-full px-4 py-2.5 border rounded-lg dark:bg-gray-800 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-colors">
 </div>
 <div class="flex justify-end">
 <button onclick="Alpine.message.success('密码修改成功')" class="px-6 py-2.5 bg-primary text-white rounded-lg hover:bg-primary/90 transition-colors">修改密码</button>
 </div>
 </div>
 </div>
 </div>
 </div>
 </div>
 </div>

</body>
</html>
