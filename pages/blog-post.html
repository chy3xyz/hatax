<!DOCTYPE html>
<html :class="{ 'dark': darkMode }" x-data="blogPostPage()">
<head>
  <script src="/theme-boot.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <title>文章 — HatTax</title>
  <style>
    .font-display { font-family: "Noto Serif SC", "Songti SC", Georgia, serif; }
    .font-ui { font-family: "DM Sans", system-ui, sans-serif; }
  </style>
</head>
<body class="site-shell font-ui">

<!-- include: site-nav -->

<main class="mx-auto max-w-3xl px-4 py-12 sm:py-16">
  <div x-show="loading" class="py-24 text-center text-stone-400">加载中…</div>
  <div x-show="error" class="py-24 text-center text-red-500" x-text="error"></div>

  <template x-if="post">
    <article class="animate-fade-in">
      <div class="flex flex-wrap gap-2">
        <template x-for="tg in (post.tags || [])" :key="tg.slug">
          <a :href="'/pages/blog.html?tag=' + tg.slug" class="site-chip hover:border-stone-400" x-text="tg.name"></a>
        </template>
      </div>
      <h1 class="font-display mt-6 text-4xl font-bold tracking-tight sm:text-5xl" x-text="post.title"></h1>
      <div class="mt-5 flex flex-wrap items-center gap-x-3 gap-y-1 text-sm text-stone-400">
        <span class="inline-flex h-8 w-8 items-center justify-center rounded-full bg-stone-900 text-xs font-semibold text-white dark:bg-white dark:text-stone-900"
          x-text="avatarChar(post.authorName)"></span>
        <template x-if="post.authorKind === 'community' && post.authorId">
          <a :href="'/pages/user.html?id=' + post.authorId" class="font-medium text-stone-700 hover:text-primary dark:text-stone-200" x-text="post.authorName"></a>
        </template>
        <template x-if="post.authorKind !== 'community'">
          <span x-text="post.authorName"></span>
        </template>
        <span class="site-chip" x-show="post.authorKind === 'community'">博客</span>
        <span>·</span>
        <time x-text="formatDate(post.publishedAt || post.createdAt, true)"></time>
        <span>·</span>
        <span x-text="(post.readingMinutes || 1) + ' 分钟阅读'"></span>
        <span>·</span>
        <span x-text="(post.viewCount || 0) + ' 阅读'"></span>
      </div>
      <p class="mt-8 border-l-2 border-primary/60 pl-4 text-lg leading-8 text-stone-500 dark:text-stone-400"
        x-show="post.excerpt" x-text="post.excerpt"></p>
      <div class="site-prose mt-10" x-html="post.bodyHtml"></div>

      <section class="mt-16 border-t border-stone-200 pt-10 dark:border-stone-800" x-show="(post.related || []).length">
        <h2 class="font-display text-2xl font-bold">相关文章</h2>
        <div class="mt-6 grid gap-4 sm:grid-cols-3">
          <template x-for="r in (post.related || [])" :key="r.id">
            <a :href="'/pages/blog-post.html?slug=' + encodeURIComponent(r.slug)" class="site-card block p-4 transition hover:border-stone-400">
              <p class="text-xs text-stone-400" x-text="formatDate(r.publishedAt || r.createdAt)"></p>
              <h3 class="mt-2 font-semibold leading-snug" x-text="r.title"></h3>
            </a>
          </template>
        </div>
      </section>
    </article>
  </template>
</main>

<script type="module">
import Alpine from 'alpinejs'
import { siteChrome, formatDate, avatarChar } from '/src/public/site.js'
import { qs, apiFetch } from '/src/public/api.js'

window.blogPostPage = function blogPostPage() {
  return {
    ...siteChrome('blog'),
    formatDate,
    avatarChar,
    loading: true,
    error: '',
    post: null,
    async init() {
      const slug = qs('slug')
      if (!slug) { this.error = '缺少文章 slug'; this.loading = false; return }
      const { json } = await apiFetch('/api/blog/posts/' + encodeURIComponent(slug))
      this.loading = false
      if (json.code !== 0) { this.error = json.msg || '加载失败'; return }
      this.post = json.data
      document.title = (this.post.title || '文章') + ' — HatTax'
    },
  }
}

window.Alpine = Alpine
Alpine.start()
</script>
</body>
</html>
