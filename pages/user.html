<!DOCTYPE html>
<html :class="{ 'dark': darkMode }" x-data="userProfilePage()">
<head>
  <script src="/theme-boot.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <title>用户主页 — HatTax</title>
  <style>.font-ui { font-family: "DM Sans", system-ui, sans-serif; }</style>
</head>
<body class="site-shell font-ui">

<!-- include: site-nav -->

<main class="mx-auto max-w-5xl px-4 py-8 sm:px-6 sm:py-10">
  <div x-show="loading" class="py-24 text-center text-stone-400">加载主页…</div>
  <div x-show="error" class="py-24 text-center text-red-500" x-text="error"></div>

  <template x-if="profile">
    <div class="animate-fade-in space-y-6">
      <!-- Hero -->
      <section class="forum-hero !p-0 overflow-hidden">
        <div class="h-28 bg-gradient-to-r from-stone-800 via-stone-700 to-sky-800 sm:h-36 dark:from-stone-200 dark:via-stone-300 dark:to-sky-200"></div>
        <div class="relative px-5 pb-6 sm:px-8">
          <div class="flex flex-col gap-5 sm:flex-row sm:items-end sm:justify-between">
            <div class="flex items-end gap-4 -mt-10 sm:-mt-12">
              <div class="flex h-20 w-20 items-center justify-center rounded-3xl border-4 border-white bg-stone-900 text-3xl font-bold text-white shadow-lg dark:border-stone-900 dark:bg-stone-100 dark:text-stone-900 sm:h-24 sm:w-24"
                x-text="avatarChar(profile.displayName)"></div>
              <div class="pb-1">
                <div class="flex flex-wrap items-center gap-2">
                  <h1 class="text-2xl font-bold tracking-tight sm:text-3xl" x-text="profile.displayName"></h1>
                  <span x-show="profile.isSelf" class="rounded-full bg-primary/10 px-2 py-0.5 text-[11px] font-semibold text-primary">这是你</span>
                  <span x-show="profile.followsBack && !profile.isSelf" class="rounded-full bg-emerald-50 px-2 py-0.5 text-[11px] font-medium text-emerald-700 dark:bg-emerald-950/40 dark:text-emerald-300">回关了你</span>
                </div>
                <p class="mt-1 text-sm text-stone-400">
                  @<span x-text="profile.username"></span>
                  · 加入于 <span x-text="formatDate(profile.createdAt)"></span>
                </p>
              </div>
            </div>
            <div class="flex flex-wrap gap-2 pb-1">
              <template x-if="profile.isSelf">
                <a href="/pages/me.html" class="rounded-xl bg-primary px-4 py-2.5 text-sm font-semibold text-white hover:opacity-90">编辑资料</a>
              </template>
              <template x-if="!profile.isSelf">
                <span class="flex flex-wrap gap-2">
                  <button type="button" @click="toggleFollow()" :disabled="busy"
                    class="rounded-xl px-4 py-2.5 text-sm font-semibold transition"
                    :class="profile.isFollowing ? 'border border-stone-300 dark:border-stone-600' : 'bg-primary text-white hover:opacity-90'"
                    x-text="profile.isFollowing ? '已关注' : '关注'"></button>
                  <button type="button" @click="openDm()" class="rounded-xl border border-stone-300 px-4 py-2.5 text-sm font-semibold dark:border-stone-600">私信</button>
                </span>
              </template>
            </div>
          </div>

          <p class="mt-5 max-w-3xl text-sm leading-relaxed text-stone-600 dark:text-stone-300"
            x-text="profile.bio || '这个人很懒，还没有写简介。'"></p>

          <div class="mt-6 grid grid-cols-3 gap-3 sm:grid-cols-6">
            <button type="button" @click="switchContent('works')" class="rounded-2xl border border-stone-200 bg-white/70 px-3 py-3 text-left transition hover:shadow-sm dark:border-stone-700 dark:bg-stone-900/60">
              <p class="text-xl font-bold tabular-nums" x-text="profile.stats?.works ?? 0"></p>
              <p class="text-[11px] text-stone-400">博客</p>
            </button>
            <button type="button" @click="tab='topics'" class="rounded-2xl border border-stone-200 bg-white/70 px-3 py-3 text-left transition hover:shadow-sm dark:border-stone-700 dark:bg-stone-900/60">
              <p class="text-xl font-bold tabular-nums" x-text="profile.stats?.topics ?? 0"></p>
              <p class="text-[11px] text-stone-400">帖子</p>
            </button>
            <button type="button" @click="tab='replies'" class="rounded-2xl border border-stone-200 bg-white/70 px-3 py-3 text-left transition hover:shadow-sm dark:border-stone-700 dark:bg-stone-900/60">
              <p class="text-xl font-bold tabular-nums" x-text="profile.stats?.replies ?? 0"></p>
              <p class="text-[11px] text-stone-400">回复</p>
            </button>
            <div class="rounded-2xl border border-stone-200 bg-white/70 px-3 py-3 dark:border-stone-700 dark:bg-stone-900/60">
              <p class="text-xl font-bold tabular-nums text-primary" x-text="profile.points"></p>
              <p class="text-[11px] text-stone-400">积分</p>
            </div>
            <button type="button" @click="openSocial('following')" class="rounded-2xl border border-stone-200 bg-white/70 px-3 py-3 text-left transition hover:shadow-sm dark:border-stone-700 dark:bg-stone-900/60">
              <p class="text-xl font-bold tabular-nums" x-text="profile.followingCount"></p>
              <p class="text-[11px] text-stone-400">关注</p>
            </button>
            <button type="button" @click="openSocial('followers')" class="rounded-2xl border border-stone-200 bg-white/70 px-3 py-3 text-left transition hover:shadow-sm dark:border-stone-700 dark:bg-stone-900/60">
              <p class="text-xl font-bold tabular-nums" x-text="profile.followerCount"></p>
              <p class="text-[11px] text-stone-400">粉丝</p>
            </button>
          </div>
        </div>
      </section>

      <div x-show="msg" class="rounded-xl px-4 py-3 text-sm"
        :class="msgOk ? 'bg-emerald-50 text-emerald-700 dark:bg-emerald-950/40 dark:text-emerald-300' : 'bg-red-50 text-red-600 dark:bg-red-950/40 dark:text-red-300'"
        x-text="msg"></div>

      <!-- DM composer -->
      <div x-show="dmOpen" x-cloak class="site-card p-5">
        <div class="flex items-center justify-between">
          <h3 class="font-semibold">私信 · <span x-text="profile.displayName"></span></h3>
          <button type="button" @click="dmOpen=false" class="text-sm text-stone-400 hover:text-stone-700">关闭</button>
        </div>
        <textarea x-model="dmBody" rows="3" maxlength="2000"
          class="mt-3 w-full rounded-xl border border-stone-200 bg-transparent px-3 py-2.5 text-sm outline-none ring-primary/30 focus:ring-2 dark:border-stone-700"
          placeholder="打个招呼，或直接问问题…"></textarea>
        <div class="mt-3 flex items-center justify-between">
          <span class="text-xs text-stone-400" x-text="(dmBody.length || 0) + ' / 2000'"></span>
          <button type="button" @click="sendDm()" :disabled="busy || !dmBody.trim()"
            class="rounded-xl bg-primary px-4 py-2 text-sm font-semibold text-white disabled:opacity-50">发送</button>
        </div>
      </div>

      <div class="grid gap-6 lg:grid-cols-12">
        <section class="lg:col-span-8 space-y-4">
          <div class="flex gap-1 rounded-full bg-stone-200/60 p-1 dark:bg-stone-800/80 w-fit">
            <button type="button" @click="switchContent('works')" class="forum-sort-btn"
              :class="tab==='works' ? 'forum-sort-btn-active' : 'text-stone-600 dark:text-stone-300'">博客</button>
            <button type="button" @click="tab='topics'" class="forum-sort-btn"
              :class="tab==='topics' ? 'forum-sort-btn-active' : 'text-stone-600 dark:text-stone-300'">帖子</button>
            <button type="button" @click="tab='replies'" class="forum-sort-btn"
              :class="tab==='replies' ? 'forum-sort-btn-active' : 'text-stone-600 dark:text-stone-300'">回复</button>
            <button type="button" @click="tab='about'" class="forum-sort-btn"
              :class="tab==='about' ? 'forum-sort-btn-active' : 'text-stone-600 dark:text-stone-300'">关于</button>
          </div>


          <!-- Works -->
          <div x-show="tab==='works'" class="site-card overflow-hidden divide-y divide-stone-100 dark:divide-stone-800">
            <div x-show="worksLoading" class="px-5 py-10 text-center text-sm text-stone-400">加载中…</div>
            <template x-if="!worksLoading && !works.length">
              <p class="px-5 py-12 text-center text-sm text-stone-400">还没有写过博客</p>
            </template>
            <template x-for="w in works" :key="'w'+w.id">
              <a :href="'/pages/blog-post.html?slug=' + encodeURIComponent(w.slug)" class="block px-5 py-4 transition hover:bg-stone-50 dark:hover:bg-stone-800/40">
                <h2 class="text-base font-semibold hover:text-primary" x-text="w.title"></h2>
                <p class="mt-1 line-clamp-2 text-sm text-stone-500" x-text="w.excerpt || excerptText(w.bodyMd)"></p>
                <p class="mt-2 text-xs text-stone-400" x-text="formatDate(w.publishedAt || w.createdAt) + ' · ' + (w.readingMinutes || 1) + ' 分钟'"></p>
              </a>
            </template>
          </div>

          <!-- Topics -->
          <div x-show="tab==='topics'" class="site-card overflow-hidden divide-y divide-stone-100 dark:divide-stone-800">
            <template x-if="!(profile.recentTopics || []).length">
              <p class="px-5 py-12 text-center text-sm text-stone-400">还没有发过帖</p>
            </template>
            <template x-for="t in (profile.recentTopics || [])" :key="'t'+t.id">
              <a :href="'/pages/forum-topic.html?id=' + t.id" class="forum-topic-row">
                <div class="min-w-0 flex-1">
                  <div class="flex flex-wrap items-center gap-2">
                    <span x-show="t.pinned" class="rounded bg-amber-100 px-1.5 py-0.5 text-[10px] font-semibold text-amber-800">置顶</span>
                    <span class="rounded-full px-2 py-0.5 text-[11px]" :style="'background:' + t.categoryColor + '18;color:' + t.categoryColor" x-text="t.categoryName"></span>
                  </div>
                  <h2 class="mt-1 text-base font-semibold hover:text-primary" x-text="t.title"></h2>
                  <p class="mt-1 line-clamp-2 text-sm text-stone-500" x-text="excerptText(t.bodyMd)"></p>
                  <p class="mt-2 text-xs text-stone-400">
                    <span x-text="relativeTime(t.lastReplyAt || t.createdAt)"></span>
                    · <span x-text="t.replyCount"></span> 回复
                    · <span x-text="t.likeCount"></span> 赞
                    · <span x-text="t.viewCount"></span> 浏览
                  </p>
                </div>
              </a>
            </template>
          </div>

          <!-- Replies -->
          <div x-show="tab==='replies'" class="site-card overflow-hidden divide-y divide-stone-100 dark:divide-stone-800">
            <template x-if="!(profile.recentReplies || []).length">
              <p class="px-5 py-12 text-center text-sm text-stone-400">还没有回复过</p>
            </template>
            <template x-for="r in (profile.recentReplies || [])" :key="'r'+r.id">
              <a :href="'/pages/forum-topic.html?id=' + r.topicId" class="block px-5 py-4 transition hover:bg-stone-50 dark:hover:bg-stone-800/40">
                <p class="text-xs text-stone-400">回复了帖子 · <span class="font-medium text-stone-600 dark:text-stone-300" x-text="r.topicTitle"></span></p>
                <p class="mt-1 line-clamp-3 text-sm text-stone-700 dark:text-stone-200" x-text="excerptText(r.bodyMd, 140)"></p>
                <p class="mt-2 text-xs text-stone-400" x-text="relativeTime(r.createdAt)"></p>
              </a>
            </template>
          </div>

          <!-- About -->
          <div x-show="tab==='about'" class="site-card p-6 space-y-4">
            <div>
              <h3 class="text-sm font-semibold text-stone-400">简介</h3>
              <p class="mt-2 text-sm leading-relaxed" x-text="profile.bio || '暂无简介'"></p>
            </div>
            <div class="grid gap-3 sm:grid-cols-2">
              <div class="rounded-xl bg-stone-50 px-4 py-3 dark:bg-stone-800/50">
                <p class="text-xs text-stone-400">用户名</p>
                <p class="mt-1 font-medium" x-text="'@' + profile.username"></p>
              </div>
              <div class="rounded-xl bg-stone-50 px-4 py-3 dark:bg-stone-800/50">
                <p class="text-xs text-stone-400">加入时间</p>
                <p class="mt-1 font-medium" x-text="formatDate(profile.createdAt)"></p>
              </div>
              <div class="rounded-xl bg-stone-50 px-4 py-3 dark:bg-stone-800/50">
                <p class="text-xs text-stone-400">给出的赞</p>
                <p class="mt-1 font-medium" x-text="profile.stats?.likesGiven ?? 0"></p>
              </div>
              <div class="rounded-xl bg-stone-50 px-4 py-3 dark:bg-stone-800/50">
                <p class="text-xs text-stone-400">获得的赞</p>
                <p class="mt-1 font-medium" x-text="profile.stats?.likesReceived ?? 0"></p>
              </div>
            </div>
          </div>
        </section>

        <aside class="lg:col-span-4 space-y-5">
          <div class="site-card overflow-hidden">
            <div class="flex items-center justify-between border-b border-stone-200 px-4 py-3 dark:border-stone-800">
              <h3 class="text-sm font-semibold">关注 <span class="font-normal text-stone-400" x-text="profile.followingCount"></span></h3>
              <button type="button" @click="openSocial('following')" class="text-xs text-primary hover:underline">全部</button>
            </div>
            <template x-if="!(profile.followingPreview || []).length">
              <p class="px-4 py-8 text-center text-sm text-stone-400">暂无关注</p>
            </template>
            <ul class="divide-y divide-stone-100 dark:divide-stone-800">
              <template x-for="u in (profile.followingPreview || [])" :key="'f'+u.id">
                <li>
                  <a :href="'/pages/user.html?id=' + u.id" class="flex items-center gap-3 px-4 py-3 transition hover:bg-stone-50 dark:hover:bg-stone-800/40">
                    <div class="flex h-9 w-9 items-center justify-center rounded-full bg-stone-800 text-xs font-bold text-white dark:bg-stone-200 dark:text-stone-900" x-text="avatarChar(u.displayName)"></div>
                    <div class="min-w-0">
                      <p class="truncate text-sm font-medium" x-text="u.displayName"></p>
                      <p class="truncate text-xs text-stone-400" x-text="'@' + u.username"></p>
                    </div>
                  </a>
                </li>
              </template>
            </ul>
          </div>

          <div class="site-card overflow-hidden">
            <div class="flex items-center justify-between border-b border-stone-200 px-4 py-3 dark:border-stone-800">
              <h3 class="text-sm font-semibold">粉丝 <span class="font-normal text-stone-400" x-text="profile.followerCount"></span></h3>
              <button type="button" @click="openSocial('followers')" class="text-xs text-primary hover:underline">全部</button>
            </div>
            <template x-if="!(profile.followersPreview || []).length">
              <p class="px-4 py-8 text-center text-sm text-stone-400">暂无粉丝</p>
            </template>
            <ul class="divide-y divide-stone-100 dark:divide-stone-800">
              <template x-for="u in (profile.followersPreview || [])" :key="'g'+u.id">
                <li>
                  <a :href="'/pages/user.html?id=' + u.id" class="flex items-center gap-3 px-4 py-3 transition hover:bg-stone-50 dark:hover:bg-stone-800/40">
                    <div class="flex h-9 w-9 items-center justify-center rounded-full bg-stone-800 text-xs font-bold text-white dark:bg-stone-200 dark:text-stone-900" x-text="avatarChar(u.displayName)"></div>
                    <div class="min-w-0">
                      <p class="truncate text-sm font-medium" x-text="u.displayName"></p>
                      <p class="truncate text-xs text-stone-400" x-text="'@' + u.username"></p>
                    </div>
                  </a>
                </li>
              </template>
            </ul>
          </div>

          <div class="site-card p-4">
            <h3 class="text-sm font-semibold">互动</h3>
            <p class="mt-2 text-sm text-stone-500 dark:text-stone-400">关注后更容易看到对方动态；私信适合一对一沟通。</p>
            <div class="mt-4 flex flex-col gap-2" x-show="!profile.isSelf">
              <button type="button" @click="toggleFollow()" :disabled="busy"
                class="w-full rounded-xl px-4 py-2.5 text-sm font-semibold"
                :class="profile.isFollowing ? 'border border-stone-300 dark:border-stone-600' : 'bg-primary text-white'"
                x-text="profile.isFollowing ? '取消关注' : '关注此人'"></button>
              <button type="button" @click="openDm()" class="w-full rounded-xl border border-stone-300 px-4 py-2.5 text-sm font-semibold dark:border-stone-600">发私信</button>
            </div>
            <a x-show="profile.isSelf" href="/pages/forum-new.html" class="mt-4 inline-flex rounded-xl bg-primary px-4 py-2.5 text-sm font-semibold text-white">去发帖</a>
          </div>
        </aside>
      </div>
    </div>
  </template>

  <!-- Social drawer -->
  <div x-show="socialOpen" x-cloak class="fixed inset-0 z-50 flex items-end justify-center sm:items-center" style="display:none">
    <div class="absolute inset-0 bg-black/40" @click="socialOpen=false"></div>
    <div class="relative z-10 max-h-[80vh] w-full max-w-md overflow-hidden rounded-t-3xl bg-white shadow-xl dark:bg-stone-900 sm:rounded-3xl">
      <div class="flex items-center justify-between border-b border-stone-200 px-5 py-4 dark:border-stone-800">
        <h3 class="font-semibold" x-text="socialMode === 'following' ? '关注列表' : '粉丝列表'"></h3>
        <button type="button" @click="socialOpen=false" class="text-sm text-stone-400">关闭</button>
      </div>
      <div class="max-h-[60vh] overflow-y-auto">
        <template x-if="!socialList.length">
          <p class="px-5 py-12 text-center text-sm text-stone-400">暂无数据</p>
        </template>
        <template x-for="u in socialList" :key="'s'+u.id">
          <a :href="'/pages/user.html?id=' + u.id" class="flex items-center gap-3 border-b border-stone-100 px-5 py-3 hover:bg-stone-50 dark:border-stone-800 dark:hover:bg-stone-800/40">
            <div class="flex h-10 w-10 items-center justify-center rounded-full bg-stone-800 text-sm font-bold text-white" x-text="avatarChar(u.displayName)"></div>
            <div class="min-w-0 flex-1">
              <p class="truncate font-medium" x-text="u.displayName"></p>
              <p class="truncate text-xs text-stone-400" x-text="'@' + u.username + (u.bio ? ' · ' + u.bio : '')"></p>
            </div>
            <span class="text-xs text-primary tabular-nums" x-text="(u.points || 0) + ' 分'"></span>
          </a>
        </template>
      </div>
    </div>
  </div>
</main>

<footer class="border-t border-stone-200 py-8 text-center text-sm text-stone-400 dark:border-stone-800">
  <a href="/pages/forum.html" class="hover:text-primary">返回论坛</a>
</footer>

<script type="module">
import Alpine from 'alpinejs'
import { siteChrome, avatarChar, formatDate, relativeTime, excerptText } from '/src/public/site.js'
import { apiFetch, isLoggedIn, loginUrl, qs } from '/src/public/api.js'

function userProfilePage() {
  return {
    ...siteChrome('forum'),
    avatarChar,
    formatDate,
    relativeTime,
    excerptText,
    loading: true,
    error: '',
    profile: null,
    busy: false,
    msg: '',
    msgOk: false,
    dmOpen: false,
    dmBody: '',
    tab: 'topics',
    works: [],
    worksLoading: false,
    socialOpen: false,
    socialMode: 'followers',
    socialList: [],
    async switchContent(name) {
      this.tab = name
      if (name === 'works') await this.loadWorks()
    },
    async loadWorks() {
      if (!this.profile?.id) return
      this.worksLoading = true
      const params = new URLSearchParams({
        authorId: String(this.profile.id),
        authorKind: 'community',
        pageSize: '20',
      })
      const { json } = await apiFetch('/api/blog/posts?' + params)
      this.worksLoading = false
      if (json.code === 0) this.works = json.data?.rows || []
    },
    async init() {
      const key = qs('id') || qs('u')
      if (!key) { this.loading = false; this.error = '缺少用户参数'; return }
      const { json } = await apiFetch('/api/community/members/' + encodeURIComponent(key))
      this.loading = false
      if (json.code !== 0) { this.error = json.msg || '加载失败'; return }
      this.profile = json.data
      document.title = (json.data.displayName || '用户') + ' — HatTax'
    },
    requireLogin() {
      if (!isLoggedIn()) {
        location.href = loginUrl(location.pathname + location.search)
        return false
      }
      return true
    },
    async toggleFollow() {
      if (!this.requireLogin()) return
      this.busy = true
      this.msg = ''
      const id = this.profile.id
      const was = this.profile.isFollowing
      const { json } = await apiFetch('/api/community/members/' + id + '/follow', {
        method: was ? 'DELETE' : 'POST',
      })
      this.busy = false
      this.msgOk = json.code === 0
      this.msg = json.msg || (json.code === 0 ? 'ok' : '操作失败')
      if (json.code === 0) {
        this.profile.isFollowing = !!json.data?.following
        this.profile.followerCount += this.profile.isFollowing ? 1 : -1
        if (this.profile.followerCount < 0) this.profile.followerCount = 0
      }
    },
    openDm() {
      if (!this.requireLogin()) return
      this.dmOpen = true
    },
    async sendDm() {
      if (!this.requireLogin()) return
      this.busy = true
      const { json } = await apiFetch('/api/community/dm/messages', {
        method: 'POST',
        body: JSON.stringify({ toMemberId: this.profile.id, body: this.dmBody }),
      })
      this.busy = false
      this.msgOk = json.code === 0
      this.msg = json.msg || (json.code === 0 ? '已发送' : '发送失败')
      if (json.code === 0) {
        this.dmBody = ''
        this.dmOpen = false
        location.href = '/pages/messages.html?id=' + json.data.conversationId
      }
    },
    async openSocial(mode) {
      this.socialMode = mode
      this.socialOpen = true
      this.socialList = []
      const path = mode === 'following'
        ? `/api/community/members/${this.profile.id}/following`
        : `/api/community/members/${this.profile.id}/followers`
      const { json } = await apiFetch(path)
      if (json.code === 0) this.socialList = json.data || []
    },
  }
}

window.Alpine = Alpine
Alpine.data('userProfilePage', userProfilePage)
Alpine.start()
</script>
</body>
</html>
