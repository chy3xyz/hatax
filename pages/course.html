<!DOCTYPE html>
<html :class="{ 'dark': darkMode }" x-data="courseDetailPage()">
<head>
  <script src="/theme-boot.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <title>课程 — HatTax</title>
  <style>
    .font-ui { font-family: "DM Sans", system-ui, sans-serif; }
    .prose-lesson h2 { font-size: 1.15rem; font-weight: 700; margin: 1rem 0 0.5rem; }
    .prose-lesson h3 { font-size: 1rem; font-weight: 600; margin: 0.75rem 0 0.4rem; }
    .prose-lesson p { margin: 0.5rem 0; line-height: 1.7; }
    .prose-lesson ul { list-style: disc; padding-left: 1.25rem; margin: 0.5rem 0; }
    .prose-lesson ol { list-style: decimal; padding-left: 1.25rem; margin: 0.5rem 0; }
    .prose-lesson code { font-size: 0.85em; background: rgba(0,0,0,.06); padding: 0.1em 0.35em; border-radius: 4px; }
  </style>
</head>
<body class="site-shell font-ui">

<!-- include: site-nav -->

<main class="mx-auto max-w-5xl px-4 py-8 sm:px-6">
  <a href="/pages/courses.html" class="site-link text-sm">← 课程商城</a>

  <div x-show="loading" class="py-24 text-center text-stone-400">加载中…</div>
  <div x-show="error && !course" class="py-24 text-center text-red-500" x-text="error"></div>

  <template x-if="course">
    <div class="mt-6 animate-fade-in">
      <div class="flex flex-wrap items-center gap-2">
        <span class="site-chip" x-text="course.typeLabel"></span>
        <span class="rounded-full bg-primary/10 px-2.5 py-0.5 text-xs font-semibold text-primary"
          x-text="course.pricePoints === 0 ? '免费' : (course.pricePoints + ' 积分')"></span>
        <span class="site-chip" x-show="course.purchased" x-text="course.pricePoints === 0 ? '可学' : '已购买'"></span>
      </div>
      <h1 class="mt-3 text-3xl font-bold tracking-tight" x-text="course.title"></h1>
      <p class="mt-2 text-stone-500" x-text="course.subtitle" x-show="course.subtitle"></p>
      <p class="mt-3 text-stone-500 dark:text-stone-400" x-text="course.summary"></p>

      <div class="mt-6 flex flex-wrap items-center gap-3">
        <template x-if="!course.purchased">
          <button type="button" @click="purchase()" :disabled="buying"
            class="rounded-xl bg-primary px-5 py-2.5 text-sm font-semibold text-white hover:opacity-90 disabled:opacity-50">
            <span x-text="buying ? '处理中…' : (course.pricePoints === 0 ? '开始学习' : '用积分购买')"></span>
          </button>
        </template>
        <template x-if="!loggedIn">
          <a :href="loginUrl(authReturn())" class="site-link text-sm">登录后购买</a>
        </template>
        <span class="text-sm text-stone-400" x-show="loggedIn">
          当前积分 <strong class="text-primary" x-text="user?.points ?? '—'"></strong>
        </span>
        <p class="w-full text-sm text-red-500" x-show="buyError" x-text="buyError"></p>
        <p class="w-full text-sm text-emerald-600" x-show="buyOk" x-text="buyOk"></p>
      </div>

      <div class="mt-8 grid gap-6 lg:grid-cols-[240px_1fr]">
        <aside class="site-card h-fit p-3">
          <p class="mb-2 px-2 text-xs font-semibold uppercase tracking-wider text-stone-400">课时目录</p>
          <template x-for="(l, i) in (course.lessons || [])" :key="l.id">
            <button type="button" @click="selectLesson(l)"
              class="mb-1 flex w-full items-start gap-2 rounded-lg px-2 py-2 text-left text-sm transition"
              :class="activeLesson?.id === l.id ? 'bg-primary/10 text-primary' : 'hover:bg-stone-100 dark:hover:bg-stone-800'">
              <span class="mt-0.5 w-5 shrink-0 text-xs text-stone-400" x-text="i + 1"></span>
              <span class="min-w-0 flex-1">
                <span class="block font-medium leading-snug" x-text="l.title"></span>
                <span class="mt-0.5 flex gap-2 text-[10px] text-stone-400">
                  <span x-text="l.contentType === 'video' ? '视频' : '文章'"></span>
                  <span x-show="l.isFree">试看</span>
                  <span x-show="!l.unlocked && !l.isFree">🔒</span>
                </span>
              </span>
            </button>
          </template>
        </aside>

        <section class="site-card p-5 sm:p-6">
          <div class="prose-lesson text-sm text-stone-600 dark:text-stone-300" x-html="course.introHtml" x-show="!activeLesson"></div>

          <template x-if="activeLesson">
            <div>
              <h2 class="text-xl font-bold" x-text="activeLesson.title"></h2>
              <template x-if="!activeLesson.unlocked">
                <div class="mt-6 rounded-xl border border-dashed border-stone-300 p-8 text-center dark:border-stone-700">
                  <p class="text-stone-500">本课时需购买课程后解锁</p>
                  <p class="mt-2 text-sm text-stone-400" x-show="activeLesson.excerpt" x-text="activeLesson.excerpt + '…'"></p>
                  <button type="button" @click="purchase()" class="mt-4 rounded-xl bg-primary px-4 py-2 text-sm font-semibold text-white"
                    x-show="!course.purchased">立即购买</button>
                </div>
              </template>
              <template x-if="activeLesson.unlocked">
                <div class="mt-4 space-y-4">
                  <template x-if="activeLesson.contentType === 'video' && activeLesson.mediaUrl">
                    <video class="w-full rounded-xl bg-black" controls playsinline :src="activeLesson.mediaUrl"></video>
                  </template>
                  <div class="prose-lesson text-sm text-stone-600 dark:text-stone-300" x-html="activeLesson.bodyHtml"></div>
                </div>
              </template>
            </div>
          </template>
        </section>
      </div>
    </div>
  </template>
</main>

<script type="module">
import Alpine from 'alpinejs'
import { siteChrome } from '/src/public/site.js'
import { apiFetch, getUser, setUser, isLoggedIn, loginUrl } from '/src/public/api.js'

window.courseDetailPage = function courseDetailPage() {
  return {
    ...siteChrome('courses'),
    loading: true,
    error: '',
    course: null,
    activeLesson: null,
    buying: false,
    buyError: '',
    buyOk: '',
    async init() {
      if (isLoggedIn()) {
        const me = await apiFetch('/api/community/me')
        if (me.json.code === 0) {
          setUser({
            id: me.json.data.id,
            username: me.json.data.username,
            displayName: me.json.data.displayName,
            points: me.json.data.points,
          })
          this.user = getUser()
          this.loggedIn = true
        }
      }
      const id = new URLSearchParams(location.search).get('id') || new URLSearchParams(location.search).get('slug')
      if (!id) {
        this.loading = false
        this.error = '缺少课程参数'
        return
      }
      const { json } = await apiFetch('/api/courses/' + encodeURIComponent(id))
      this.loading = false
      if (json.code !== 0) {
        this.error = json.msg || '加载失败'
        return
      }
      this.course = json.data
      const firstFree = (this.course.lessons || []).find((l) => l.unlocked || l.isFree)
      if (firstFree) this.selectLesson(firstFree)
    },
    selectLesson(l) {
      this.activeLesson = l
    },
    async purchase() {
      this.buyError = ''
      this.buyOk = ''
      if (!isLoggedIn()) {
        location.href = loginUrl(this.authReturn())
        return
      }
      if (!confirm(this.course.pricePoints > 0
        ? `确认消耗 ${this.course.pricePoints} 积分购买「${this.course.title}」？`
        : `确认开始学习「${this.course.title}」？`)) return
      this.buying = true
      const { json } = await apiFetch('/api/courses/' + this.course.id + '/purchase', {
        method: 'POST',
        body: '{}',
      })
      this.buying = false
      if (json.code !== 0) {
        this.buyError = json.msg || '购买失败'
        return
      }
      this.buyOk = json.msg || '购买成功'
      this.course = json.data.course
      if (json.data.member?.points != null) {
        setUser({ ...getUser(), points: json.data.member.points })
        this.user = getUser()
      }
      const first = (this.course.lessons || []).find((l) => l.unlocked)
      if (first) this.selectLesson(first)
    },
  }
}

Alpine.start()
</script>
</body>
</html>
