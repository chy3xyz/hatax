<!-- layout: site-shell -->
<html>
<head><title>合成挖矿</title></head>
<body>
<div id="page-content" x-data="dappMing" x-init="init()" class="pt-28 pb-8 p-6 animate-fade-in"
  :class="$store.app.sidebarOpen ? 'lg:ml-64' : 'lg:ml-0'"
  :style="'transition: margin-left 0.3s ease;'">

  <nav class="flex items-center gap-1 text-sm text-gray-500 dark:text-gray-400 overflow-x-auto mb-4" aria-label="Breadcrumb">
    <a href="/pages/dashboard.html" class="flex items-center gap-1 hover:text-primary transition-colors flex-shrink-0">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
      <span class="hidden sm:inline">首页</span>
    </a>
    <div class="flex items-center gap-1 flex-shrink-0">
      <svg class="w-3.5 h-3.5 text-gray-300 dark:text-gray-600 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
      <span class="text-gray-700 dark:text-gray-200 font-medium whitespace-nowrap">合成挖矿</span>
    </div>
  </nav>

  <div class="mb-6">
    <h1 class="text-2xl font-bold">合成挖矿</h1>
    <p class="text-gray-500 text-sm mt-1">A+M 合成挖矿，质押获取收益</p>
  </div>

  <div x-show="!address" class="bg-white dark:bg-gray-900 rounded-xl border p-8 text-center">
    <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-primary/10 flex items-center justify-center">
      <svg class="w-8 h-8 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
    </div>
    <h3 class="text-lg font-semibold mb-2">连接钱包</h3>
    <button @click="connect()" :disabled="connecting" class="px-6 py-2.5 bg-primary text-white rounded-lg font-medium hover:bg-primary/90 disabled:opacity-50">
      <span x-text="connecting ? '连接中...' : '连接 MetaMask'"></span>
    </button>
  </div>

  <div x-show="address" class="space-y-6 max-w-2xl">
    <!-- Stake Form -->
    <div class="bg-white dark:bg-gray-900 rounded-xl border p-6">
      <h3 class="text-lg font-semibold mb-4">A+M 合成挖矿</h3>

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1.5 text-gray-700 dark:text-gray-300">A-Token 数量</label>
          <div class="flex gap-2">
            <input type="number" x-model="zy_a" @input="syncB()" placeholder="输入数量" class="flex-1 px-4 py-2.5 border rounded-lg dark:bg-gray-800 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary/30">
            <button @click="maxToken('a')" class="px-3 py-2.5 border rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 text-sm">MAX</button>
          </div>
          <div class="text-xs text-gray-500 mt-1">余额: <span x-text="aBalance">0</span></div>
        </div>

        <div>
          <label class="block text-sm font-medium mb-1.5 text-gray-700 dark:text-gray-300">M-Token 数量</label>
          <div class="flex gap-2">
            <input type="number" x-model="zy_b" @input="syncA()" placeholder="输入数量" class="flex-1 px-4 py-2.5 border rounded-lg dark:bg-gray-800 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary/30">
            <button @click="maxToken('b')" class="px-3 py-2.5 border rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 text-sm">MAX</button>
          </div>
          <div class="text-xs text-gray-500 mt-1">余额: <span x-text="bBalance">0</span></div>
        </div>
      </div>

      <div class="mt-6 flex gap-3">
        <button x-show="!isApprovedA" @click="approve('a')" :disabled="loading" class="px-5 py-2.5 bg-primary text-white rounded-lg font-medium hover:bg-primary/90 disabled:opacity-50">授权 A</button>
        <button x-show="!isApprovedB && isApprovedA" @click="approve('b')" :disabled="loading" class="px-5 py-2.5 bg-primary text-white rounded-lg font-medium hover:bg-primary/90 disabled:opacity-50">授权 M</button>
        <button x-show="isApprovedA && isApprovedB" @click="deposit()" :disabled="loading" class="px-5 py-2.5 bg-primary text-white rounded-lg font-medium hover:bg-primary/90 disabled:opacity-50">合成质押</button>
      </div>
    </div>

    <!-- Earnings -->
    <div x-show="is_show" class="bg-white dark:bg-gray-900 rounded-xl border p-6">
      <h3 class="text-lg font-semibold mb-4">收益信息</h3>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="p-4 bg-gray-50 dark:bg-gray-800 rounded-lg">
          <div class="text-xs text-gray-500 mb-1">待领取收益 (LC)</div>
          <div class="text-xl font-bold text-amber-500" x-text="fetchAmount">0</div>
        </div>
        <div class="p-4 bg-gray-50 dark:bg-gray-800 rounded-lg">
          <div class="text-xs text-gray-500 mb-1">算力</div>
          <div class="text-xl font-bold" x-text="slAmount">0</div>
        </div>
        <div class="p-4 bg-gray-50 dark:bg-gray-800 rounded-lg">
          <div class="text-xs text-gray-500 mb-1">开始时间</div>
          <div class="text-xl font-bold" x-text="timeer">暂无</div>
        </div>
      </div>
      <button @click="extract()" :disabled="loading || parseFloat(fetchAmount)==0" class="mt-4 px-5 py-2.5 bg-primary text-white rounded-lg font-medium hover:bg-primary/90 disabled:opacity-50">提取收益</button>
    </div>
  </div>

  <script type="module">
    import '/main.js'
    import {
      connectWallet, getAddress, readContract, writeContract,
      getTokenBalance, getAllowance, approveToken,
      ADDRESSES, ERC20_ABI, MINTER_ABI, formatEther, parseEther
    } from '/web3/wallet.js'

    Alpine.data('dappMing', () => ({
      loading: false,
      connecting: false,
      address: getAddress(),
      isApprovedA: false,
      isApprovedB: false,
      zy_a: '',
      zy_b: '',
      aBalance: '0',
      bBalance: '0',
      slAmount: '0',
      fetchAmount: '0',
      timeer: '暂无',
      is_show: false,

      async init() {
        if (this.address) {
          await this.getBalanceA()
          await this.getBalanceB()
          await this.getApproveA()
          await this.getApproveB()
          await this.getUserInfo()
          await this.getPaddingFetch()
        }
      },

      async connect() {
        this.connecting = true
        try {
          this.address = await connectWallet()
          Alpine.notify.success('钱包连接成功')
          await this.init()
        } catch (e) {
          Alpine.notify.error(e.message || '连接失败')
        }
        this.connecting = false
      },

      syncB() { this.zy_b = this.zy_a },
      syncA() { this.zy_a = this.zy_b },

      async maxToken(t) {
        if (t === 'a') { this.zy_a = this.aBalance; this.zy_b = this.aBalance }
        else { this.zy_b = this.bBalance; this.zy_a = this.bBalance }
      },

      async getBalanceA() {
        try {
          const bal = await getTokenBalance(ADDRESSES.aToken, this.address)
          this.aBalance = parseFloat(bal).toFixed(4)
        } catch (e) {}
      },

      async getBalanceB() {
        try {
          const bal = await getTokenBalance(ADDRESSES.bToken, this.address)
          this.bBalance = parseFloat(bal).toFixed(4)
        } catch (e) {}
      },

      async getApproveA() {
        try {
          const all = await getAllowance(ADDRESSES.aToken, this.address, ADDRESSES.minter)
          this.isApprovedA = parseFloat(all) >= 100000000
        } catch (e) {}
      },

      async getApproveB() {
        try {
          const all = await getAllowance(ADDRESSES.bToken, this.address, ADDRESSES.minter)
          this.isApprovedB = parseFloat(all) >= 100000000
        } catch (e) {}
      },

      async getUserInfo() {
        try {
          const res = await readContract({ address: ADDRESSES.minter, abi: MINTER_ABI, functionName: 'userInfo', args: [this.address] })
          this.slAmount = res[4].toString()
          this.is_show = true
          const lock = await readContract({ address: ADDRESSES.minter, abi: MINTER_ABI, functionName: 'lockTime' })
          if (res[4] > 0 && res[5]) {
            this.timeer = this.formatDate(Number(res[2]))
          } else if (res[4] > 0 && !res[5]) {
            this.timeer = '已到期'
          } else {
            this.timeer = '暂无'
          }
        } catch (e) {}
      },

      async getPaddingFetch() {
        try {
          const val = await readContract({ address: ADDRESSES.minter, abi: MINTER_ABI, functionName: 'pending', args: [this.address] })
          this.fetchAmount = parseFloat(formatEther(val)).toFixed(4)
        } catch (e) {}
      },

      formatDate(ts) {
        const d = new Date(ts * 1000)
        return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0') + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0')
      },

      async approve(t) {
        this.loading = true
        try {
          const token = t === 'a' ? ADDRESSES.aToken : ADDRESSES.bToken
          const hash = await approveToken(token, ADDRESSES.minter)
          Alpine.notify.success('授权成功')
          if (t === 'a') this.isApprovedA = true
          else this.isApprovedB = true
        } catch (e) {
          Alpine.notify.error(e.message || '授权失败')
        }
        this.loading = false
      },

      async deposit() {
        if (!this.zy_a || this.zy_a <= 0) {
          Alpine.notify.warning('请输入数量')
          return
        }
        this.loading = true
        try {
          const hash = await writeContract({ address: ADDRESSES.minter, abi: MINTER_ABI, functionName: 'deposit', args: [parseEther(String(this.zy_a))] })
          Alpine.notify.success('质押成功')
          this.zy_a = ''
          this.zy_b = ''
          await this.getBalanceA()
          await this.getBalanceB()
          await this.getPaddingFetch()
          await this.getUserInfo()
        } catch (e) {
          Alpine.notify.error(e.message || '质押失败')
        }
        this.loading = false
      },

      async extract() {
        if (parseFloat(this.fetchAmount) == 0) {
          Alpine.notify.warning('无可提取收益')
          return
        }
        this.loading = true
        try {
          const hash = await writeContract({ address: ADDRESSES.minter, abi: MINTER_ABI, functionName: 'withdrawCount', args: [this.address] })
          Alpine.notify.success('提取成功')
          await this.getPaddingFetch()
          await this.getUserInfo()
        } catch (e) {
          Alpine.notify.error(e.message || '提取失败')
        }
        this.loading = false
      }
    }))
    queueMicrotask(() => {
      const el = document.getElementById("page-content")
      if (el) { try { Alpine.destroyTree(el) } catch(e) {}; Alpine.initTree(el) }
    })
  Alpine.start()
</script>
</div>
</body>
</html>
