<!-- layout: site-shell -->
<html>
<head><title>NFT</title></head>
<body>
<div id="page-content" x-data="dappNft" x-init="init()" class="pt-28 pb-8 p-6 animate-fade-in"
  :class="$store.app.sidebarOpen ? 'lg:ml-64' : 'lg:ml-0'"
  :style="'transition: margin-left 0.3s ease;'">

  <nav class="flex items-center gap-1 text-sm text-gray-500 dark:text-gray-400 overflow-x-auto mb-4" aria-label="Breadcrumb">
    <a href="/pages/dashboard.html" class="flex items-center gap-1 hover:text-primary transition-colors flex-shrink-0">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
      <span class="hidden sm:inline">首页</span>
    </a>
    <div class="flex items-center gap-1 flex-shrink-0">
      <svg class="w-3.5 h-3.5 text-gray-300 dark:text-gray-600 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
      <span class="text-gray-700 dark:text-gray-200 font-medium whitespace-nowrap">NFT</span>
    </div>
  </nav>

  <div class="mb-6">
    <h1 class="text-2xl font-bold">NFT</h1>
    <p class="text-gray-500 text-sm mt-1">购买 NFT</p>
  </div>

  <div x-show="!address" class="bg-white dark:bg-gray-900 rounded-xl border p-8 text-center">
    <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-primary/10 flex items-center justify-center">
      <svg class="w-8 h-8 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
    </div>
    <h3 class="text-lg font-semibold mb-2">连接钱包</h3>
    <button @click="connect()" :disabled="connecting" class="px-6 py-2.5 bg-primary text-white rounded-lg font-medium hover:bg-primary/90 disabled:opacity-50">
      <span x-text="connecting ? '连接中...' : '连接 MetaMask'"></span>
    </button>
  </div>

  <div x-show="address" class="space-y-6 max-w-xl">
    <div class="bg-white dark:bg-gray-900 rounded-xl border p-6">
      <div class="flex items-center gap-4 mb-6">
        <div class="w-20 h-20 rounded-xl bg-gradient-to-br from-primary/20 to-primary/5 flex items-center justify-center">
          <svg class="w-10 h-10 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
        </div>
        <div>
          <h3 class="text-lg font-semibold">ChyNFT</h3>
          <div class="text-amber-500 font-bold text-xl mt-1">100 USDT</div>
        </div>
      </div>

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1.5 text-gray-700 dark:text-gray-300">购买数量</label>
          <input type="number" x-model="zy_num" placeholder="输入数量" class="w-full px-4 py-2.5 border rounded-lg dark:bg-gray-800 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary/30">
        </div>
      </div>

      <div class="mt-6 flex gap-3">
        <button x-show="!isApprovedUsdt" @click="approveUsdt()" :disabled="loading" class="px-5 py-2.5 bg-primary text-white rounded-lg font-medium hover:bg-primary/90 disabled:opacity-50">授权 USDT</button>
        <button x-show="isApprovedUsdt" @click="buyNft()" :disabled="loading" class="px-5 py-2.5 bg-primary text-white rounded-lg font-medium hover:bg-primary/90 disabled:opacity-50">确认购买</button>
      </div>
    </div>
  </div>

  <script type="module">
    import '/main.js'
    import {
      connectWallet, getAddress, readContract, writeContract,
      getAllowance, approveToken,
      ADDRESSES, ERC20_ABI, NFTSALE_ABI, formatEther, parseEther
    } from '/web3/wallet.js'

    Alpine.data('dappNft', () => ({
      loading: false,
      connecting: false,
      address: getAddress(),
      isApprovedUsdt: false,
      zy_num: '',

      async init() {
        if (this.address) {
          await this.getApproveUsdt()
        }
      },

      async connect() {
        this.connecting = true
        try {
          this.address = await connectWallet()
          Alpine.notify.success('钱包连接成功')
          await this.init()
        } catch (e) {
          Alpine.notify.error(e.message || '连接失败')
        }
        this.connecting = false
      },

      async getApproveUsdt() {
        try {
          const all = await getAllowance(ADDRESSES.usdt, this.address, ADDRESSES.nftSale)
          this.isApprovedUsdt = parseFloat(all) >= 100000000
        } catch (e) {}
      },

      async approveUsdt() {
        this.loading = true
        try {
          const hash = await approveToken(ADDRESSES.usdt, ADDRESSES.nftSale)
          Alpine.notify.success('授权成功')
          this.isApprovedUsdt = true
        } catch (e) {
          Alpine.notify.error(e.message || '授权失败')
        }
        this.loading = false
      },

      async buyNft() {
        if (!this.zy_num || this.zy_num <= 0) {
          Alpine.notify.warning('请输入数量')
          return
        }
        this.loading = true
        try {
          const hash = await writeContract({
            address: ADDRESSES.nftSale,
            abi: NFTSALE_ABI,
            functionName: 'buyNFT',
            args: [this.address, parseInt(this.zy_num), false]
          })
          Alpine.notify.success('购买成功')
          this.zy_num = ''
        } catch (e) {
          Alpine.notify.error(e.message || '购买失败')
        }
        this.loading = false
      }
    }))
    queueMicrotask(() => {
      const el = document.getElementById("page-content")
      if (el) { try { Alpine.destroyTree(el) } catch(e) {}; Alpine.initTree(el) }
    })
  Alpine.start()
</script>
</div>
</body>
</html>
