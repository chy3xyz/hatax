<!-- layout: app-shell -->
<html>
<head><title>订单管理</title></head>
<body>
<div id="page-content" x-data="orderMgmt" x-init="init()" class="pt-6 p-6 animate-fade-in">

  <div class="mb-6 flex justify-between items-start">
    <div>
      <h1 class="text-2xl font-bold">订单管理</h1>
      <p class="text-gray-500 text-sm mt-1">Ponder 订单数据 — 更新发货状态</p>
    </div>
    <button @click="refresh()" class="px-3 py-1.5 border rounded-lg text-sm hover:bg-gray-100 dark:hover:bg-gray-800">
      <svg class="w-4 h-4 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>刷新
    </button>
  </div>

  <!-- Filters -->
  <div class="flex gap-3 mb-4 flex-wrap">
    <input x-model="searchAddr" @input="filter()" placeholder="搜索用户地址" class="px-3 py-2 border rounded-lg text-sm dark:bg-gray-800 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary/30 w-64">
    <select x-model="statusFilter" @change="filter()" class="px-3 py-2 border rounded-lg text-sm dark:bg-gray-800 dark:border-gray-600">
      <option value="">全部状态</option>
      <option value="pending">待支付</option>
      <option value="paid">已支付</option>
      <option value="shipped">已发货</option>
      <option value="completed">已完成</option>
      <option value="cancelled">已取消</option>
    </select>
  </div>

  <!-- Table -->
  <div class="bg-white dark:bg-gray-900 rounded-xl border overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 dark:bg-gray-800 text-left">
        <tr>
          <th class="px-4 py-3 font-medium">orderRef</th>
          <th class="px-4 py-3 font-medium">用户</th>
          <th class="px-4 py-3 font-medium">产品ID</th>
          <th class="px-4 py-3 font-medium">金额</th>
          <th class="px-4 py-3 font-medium">状态</th>
          <th class="px-4 py-3 font-medium">收货人</th>
          <th class="px-4 py-3 font-medium">操作</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-100 dark:divide-gray-800">
        <template x-for="o in filteredOrders" :key="o.orderRef">
          <tr class="hover:bg-gray-50 dark:hover:bg-gray-800/50">
            <td class="px-4 py-3 font-mono text-xs text-gray-500" x-text="o.orderRef?.slice(0,16)+'...'"></td>
            <td class="px-4 py-3 font-mono text-xs" x-text="o.buyer?.slice(0,8)+'...'"></td>
            <td class="px-4 py-3" x-text="o.productId"></td>
            <td class="px-4 py-3" x-text="o.amount ? (Number(o.amount)/1e18).toFixed(0)+'U' : '--'"></td>
            <td class="px-4 py-3">
              <span class="px-2 py-0.5 rounded-full text-xs font-medium"
                :class="statusBadge(o.status)" x-text="statusLabel(o.status)"></span>
            </td>
            <td class="px-4 py-3 text-xs" x-text="o.recipientName || '--'"></td>
            <td class="px-4 py-3">
              <template x-if="o.status === 'paid'">
                <button @click="updateStatus(o.orderRef,'shipped')" class="px-3 py-1 bg-blue-500 text-white rounded text-xs hover:bg-blue-600">发货</button>
              </template>
              <template x-if="o.status === 'shipped'">
                <button @click="updateStatus(o.orderRef,'completed')" class="px-3 py-1 bg-green-500 text-white rounded text-xs hover:bg-green-600">完成</button>
              </template>
              <span x-show="o.status==='completed'||o.status==='cancelled'" class="text-xs text-gray-400">--</span>
            </td>
          </tr>
        </template>
      </tbody>
    </table>
    <div x-show="filteredOrders.length===0" class="text-center py-8 text-sm text-gray-400">暂无订单</div>
  </div>

  <script type="module">
    import '/main.js'
    import { createOrder, getOrder, getUserOrders, updateOrderStatus } from '/api.js'

    Alpine.data('orderMgmt', () => ({
      orders: [],
      searchAddr: '',
      statusFilter: '',

      get filteredOrders() {
        return this.orders.filter(o => {
          if (this.statusFilter && o.status !== this.statusFilter) return false
          if (this.searchAddr && !o.buyer?.toLowerCase().includes(this.searchAddr.toLowerCase())) return false
          return true
        })
      },

      async init() { await this.refresh() },

      async refresh() {
        try {
          // Load all recent orders — query by empty search
          const resp = await fetch('/api/orders/user/0x0000000000000000000000000000000000000000?limit=200')
          // For admin, we need a global orders endpoint. For now, search by common addresses.
          this.orders = []
          Alpine.notify.info('请输入用户地址查看订单')
        } catch (e) { console.error(e) }
      },

      async filter() {
        if (!this.searchAddr || this.searchAddr.length < 40) return
        try {
          const data = await getUserOrders(this.searchAddr)
          this.orders = data.orders || []
        } catch (e) { Alpine.notify.error(e.message) }
      },

      async updateStatus(ref, status) {
        try {
          await updateOrderStatus(ref, status)
          Alpine.notify.success('状态已更新')
          this.orders = this.orders.map(o => o.orderRef === ref ? {...o, status} : o)
        } catch (e) { Alpine.notify.error(e.message) }
      },

      statusLabel(s) {
        const m = { pending:'待支付', paid:'已支付', shipped:'已发货', completed:'已完成', cancelled:'已取消' }
        return m[s]||s
      },
      statusBadge(s) {
        const m = { pending:'bg-yellow-100 text-yellow-700', paid:'bg-green-100 text-green-700', shipped:'bg-blue-100 text-blue-700', completed:'bg-gray-100 text-gray-600', cancelled:'bg-red-100 text-red-700' }
        return m[s]||''
      }
    }))
    queueMicrotask(() => {
      const el = document.getElementById("page-content")
      if (el) { try { Alpine.destroyTree(el) } catch(e) {}; Alpine.initTree(el) }
    })
  Alpine.start()
</script>
</div>
</body>
</html>
