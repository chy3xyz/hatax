<!-- layout: app-shell -->
<html>
<head>
  <title>角色权限</title>
  
</head>
<body>
<div id="page-content" x-data class="pt-28 p-6"
 :class="$store.app.sidebarOpen ? 'lg:ml-64' : 'lg:ml-0'"
 :style="`transition: margin-left 0.3s ease; -webkit-transition: margin-left 0.3s ease;`">
 <nav class="flex items-center gap-1 text-sm text-gray-500 dark:text-gray-400 overflow-x-auto" aria-label="Breadcrumb">
 <a href="/pages/admin/dashboard.html" class="flex items-center gap-1 hover:text-primary transition-colors flex-shrink-0">
 <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
 <span class="hidden sm:inline">首页</span>
 </a>
 <template x-for="(crumb, i) in $store.app.breadcrumbs.slice(1)" :key="i">
 <div class="flex items-center gap-1 flex-shrink-0">
 <svg class="w-3.5 h-3.5 text-gray-300 dark:text-gray-600 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
 <a x-show="crumb.path && crumb.path !== '#'"
 :href="crumb.path"
 class="hover:text-primary transition-colors whitespace-nowrap"
 x-text="crumb.title"></a>
 <span x-show="!crumb.path || crumb.path === '#'"
 class="text-gray-700 dark:text-gray-200 font-medium whitespace-nowrap"
 x-text="crumb.title"></span>
 </div>
 </template>
</nav>


 <div class="flex justify-between items-center mb-6">
 <h1 class="text-2xl font-bold">角色权限</h1>
 <button onclick="Alpine.message.success('新增角色功能')" class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary/90 transition-colors">+ 新增角色</button>
 </div>

 <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
 <div class="lg:col-span-1 space-y-2">
 <div class="bg-white dark:bg-gray-900 rounded-lg border border-gray-200 dark:border-gray-700 p-4 space-y-1">
 <div class="sidebar-item active"><span>超级管理员</span></div>
 <div class="sidebar-item"><span>运营主管</span></div>
 <div class="sidebar-item"><span>普通员工</span></div>
 <div class="sidebar-item"><span>访客角色</span></div>
 </div>
 </div>

 <div class="lg:col-span-2 bg-white dark:bg-gray-900 rounded-lg border border-gray-200 dark:border-gray-700 overflow-hidden">
 <div class="p-4 border-b border-gray-200 dark:border-gray-700">
 <h3 class="font-semibold">角色：超级管理员</h3>
 <p class="text-sm text-gray-500 mt-1">拥有系统所有权限</p>
 </div>
 <div class="p-4">
 <div class="space-y-4">
 <div>
 <div class="flex items-center justify-between py-2 border-b border-gray-100 dark:border-gray-800">
 <span class="font-medium text-sm">系统管理</span>
 <label class="flex items-center gap-2 cursor-pointer text-sm">
 <input type="checkbox" checked class="w-4 h-4 rounded text-primary">
 <span>全选</span>
 </label>
 </div>
 <div class="pl-4 space-y-2 mt-2">
 <label class="flex items-center gap-2 cursor-pointer text-sm"><input type="checkbox" checked class="w-4 h-4 rounded text-primary"> 用户管理</label>
 <label class="flex items-center gap-2 cursor-pointer text-sm"><input type="checkbox" checked class="w-4 h-4 rounded text-primary"> 角色权限</label>
 <label class="flex items-center gap-2 cursor-pointer text-sm"><input type="checkbox" checked class="w-4 h-4 rounded text-primary"> 菜单配置</label>
 </div>
 </div>
 <div>
 <div class="flex items-center justify-between py-2 border-b border-gray-100 dark:border-gray-800">
 <span class="font-medium text-sm">业务管理</span>
 <label class="flex items-center gap-2 cursor-pointer text-sm">
 <input type="checkbox" checked class="w-4 h-4 rounded text-primary">
 <span>全选</span>
 </label>
 </div>
 <div class="pl-4 space-y-2 mt-2">
 <label class="flex items-center gap-2 cursor-pointer text-sm"><input type="checkbox" checked class="w-4 h-4 rounded text-primary"> 仪表盘</label>
 <label class="flex items-center gap-2 cursor-pointer text-sm"><input type="checkbox" checked class="w-4 h-4 rounded text-primary"> 基础表单</label>
 <label class="flex items-center gap-2 cursor-pointer text-sm"><input type="checkbox" checked class="w-4 h-4 rounded text-primary"> 高级表单</label>
 <label class="flex items-center gap-2 cursor-pointer text-sm"><input type="checkbox" checked class="w-4 h-4 rounded text-primary"> 表格列表</label>
 </div>
 </div>
 <div>
 <div class="flex items-center justify-between py-2 border-b border-gray-100 dark:border-gray-800">
 <span class="font-medium text-sm">数据管理</span>
 <label class="flex items-center gap-2 cursor-pointer text-sm">
 <input type="checkbox" checked class="w-4 h-4 rounded text-primary">
 <span>全选</span>
 </label>
 </div>
 <div class="pl-4 space-y-2 mt-2">
 <label class="flex items-center gap-2 cursor-pointer text-sm"><input type="checkbox" checked class="w-4 h-4 rounded text-primary"> 数据导出</label>
 <label class="flex items-center gap-2 cursor-pointer text-sm"><input type="checkbox" checked class="w-4 h-4 rounded text-primary"> 数据备份</label>
 <label class="flex items-center gap-2 cursor-pointer text-sm"><input type="checkbox" checked class="w-4 h-4 rounded text-primary"> 操作日志</label>
 </div>
 </div>
 </div>
 <div class="flex justify-end gap-3 mt-6">
 <button onclick="Alpine.message.success('权限更新成功')" class="px-6 py-2.5 bg-primary text-white rounded-lg hover:bg-primary/90 transition-colors">保存</button>
 </div>
 </div>
 </div>
 </div>
 </div>

</body>
</html>
