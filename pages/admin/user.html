<!-- layout: app-shell -->
<html>
<head>
  <title>用户管理</title>
  
</head>
<body>
<div id="page-content" x-data class="pt-28 p-6 pb-12 space-y-6 animate-fade-in"
 :class="$store.app.sidebarOpen ? 'lg:ml-64' : 'lg:ml-0'"
 :style="`transition: margin-left 0.3s ease; -webkit-transition: margin-left 0.3s ease;`">
 <nav class="flex items-center gap-1 text-sm text-gray-500 dark:text-gray-400 overflow-x-auto" aria-label="Breadcrumb">
 <a href="/pages/admin/dashboard.html" class="flex items-center gap-1 hover:text-primary transition-colors flex-shrink-0">
 <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
 <span class="hidden sm:inline">首页</span>
 </a>
 <template x-for="(crumb, i) in $store.app.breadcrumbs.slice(1)" :key="i">
 <div class="flex items-center gap-1 flex-shrink-0">
 <svg class="w-3.5 h-3.5 text-gray-300 dark:text-gray-600 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
 <a x-show="crumb.path && crumb.path !== '#'"
 :href="crumb.path"
 class="hover:text-primary transition-colors whitespace-nowrap"
 x-text="crumb.title"></a>
 <span x-show="!crumb.path || crumb.path === '#'"
 class="text-gray-700 dark:text-gray-200 font-medium whitespace-nowrap"
 x-text="crumb.title"></span>
 </div>
 </template>
</nav>


 <div class="flex justify-between items-center">
 <h1 class="text-2xl font-bold">用户管理</h1>
 <button class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary/90 transition-all flex items-center gap-2" onclick="Alpine.notify.success('打开新增表单')">
 <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
 新增用户
 </button>
 </div>

 <div class="bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-700 overflow-hidden">
 <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex flex-wrap gap-3">
 <input name="keyword" placeholder="搜索用户名/手机号" class="px-3 py-2 border rounded-lg flex-1 max-w-xs dark:bg-gray-800 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-colors">
 <select class="px-3 py-2 border rounded-lg dark:bg-gray-800 dark:border-gray-600">
 <option value="">全部角色</option><option>超级管理员</option><option>普通用户</option>
 </select>
 <select class="px-3 py-2 border rounded-lg dark:bg-gray-800 dark:border-gray-600">
 <option value="">全部状态</option><option>正常</option><option>禁用</option>
 </select>
 <button hx-get="/mock-api/user-list.html" hx-include="[name='keyword']" hx-target="#user-tbody" class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary/90 transition-colors flex items-center gap-1.5">
 <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
 搜索
 </button>
 <button hx-get="/mock-api/user-list.html" hx-target="#user-tbody" class="px-4 py-2 border rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">重置</button>
 </div>

 <div class="overflow-x-auto">
 <table class="w-full text-left table-fixed">
 <thead class="bg-gray-50 dark:bg-gray-800 text-sm">
 <tr class="border-b border-gray-200 dark:border-gray-700">
 <th class="px-4 py-3 font-medium w-12"><input type="checkbox" class="w-4 h-4 rounded"></th>
 <th class="px-4 py-3 font-medium cursor-pointer hover:text-primary transition-colors w-14">ID</th>
 <th class="px-4 py-3 font-medium cursor-pointer hover:text-primary transition-colors">用户名</th>
 <th class="px-4 py-3 font-medium w-32">手机号</th>
 <th class="px-4 py-3 font-medium w-24">角色</th>
 <th class="px-4 py-3 font-medium w-20">状态</th>
 <th class="px-4 py-3 font-medium w-28">创建时间</th>
 <th class="px-4 py-3 font-medium text-right w-32">操作</th>
 </tr>
 </thead>
 <tbody id="user-tbody" hx-get="/mock-api/user-list.html" hx-trigger="load" hx-swap="innerHTML" class="divide-y divide-gray-100 dark:divide-gray-800">
  <tr><td colspan="8" class="px-4 py-8 text-center text-gray-400">加载中...</td></tr>
 </tbody>
 </table>
 </div>

 <div class="p-4 flex justify-between items-center border-t border-gray-200 dark:border-gray-700 text-sm text-gray-500">
 <span>共 3 条记录</span>
 <div class="flex gap-1">
 <button class="px-3 py-1 border rounded hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors disabled:opacity-40" disabled>上一页</button>
 <button class="px-3 py-1 bg-primary text-white rounded">1</button>
 <button class="px-3 py-1 border rounded hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">2</button>
 <button class="px-3 py-1 border rounded hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">3</button>
 <button class="px-3 py-1 border rounded hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">下一页</button>
 </div>
 </div>
 </div>
 </div>

</body>
</html>
