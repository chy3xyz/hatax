<!DOCTYPE html>
<html>
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <link rel="stylesheet" href="/style.css">
 <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛠️</text></svg>">
 <title>登录 - HatTax 管理后台</title>
</head>
<body class="min-h-screen bg-gradient-to-br from-primary/5 via-white to-primary/10 flex items-center justify-center p-4">
 <div class="w-full max-w-md" x-data="loginForm">
 <div class="text-center mb-8">
 <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary/10 mb-4">
 <svg class="w-8 h-8 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
 </div>
 <h1 class="text-2xl font-bold text-gray-900 dark:text-white">HatTax 管理后台</h1>
 <p class="text-gray-500 mt-1">请登录以继续</p>
 </div>

 <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-xl border border-gray-200 dark:border-gray-700 p-8">
 <div x-show="error" class="mb-4 p-3 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg text-red-600 dark:text-red-400 text-sm" x-text="error"></div>

 <form @submit.prevent="handleLogin" class="space-y-5">
 <div>
 <label class="block text-sm font-medium mb-1.5 text-gray-700 dark:text-gray-300">用户名</label>
 <input
 type="text"
 x-model="username"
 placeholder="请输入用户名"
 class="w-full px-4 py-2.5 border rounded-lg dark:bg-gray-800 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-colors"
 :class="{ 'border-red-400': fieldErrors.username }">
 <div x-show="fieldErrors.username" class="form-error" x-text="fieldErrors.username"></div>
 </div>

 <div>
 <label class="block text-sm font-medium mb-1.5 text-gray-700 dark:text-gray-300">密码</label>
 <input
 type="password"
 x-model="password"
 placeholder="请输入密码"
 class="w-full px-4 py-2.5 border rounded-lg dark:bg-gray-800 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-colors"
 :class="{ 'border-red-400': fieldErrors.password }">
 <div x-show="fieldErrors.password" class="form-error" x-text="fieldErrors.password"></div>
 </div>

 <div class="flex items-center justify-between">
 <label class="flex items-center gap-2 cursor-pointer">
 <input type="checkbox" x-model="remember" class="w-4 h-4 rounded border-gray-300 text-primary focus:ring-primary">
 <span class="text-sm text-gray-600 dark:text-gray-400">记住我</span>
 </label>
 <a href="#" class="text-sm text-primary hover:underline">忘记密码？</a>
 </div>

 <button
 type="submit"
 :disabled="loading"
 class="w-full py-2.5 bg-primary text-white rounded-lg font-medium hover:bg-primary/90 disabled:opacity-50 disabled:cursor-not-allowed transition-colors flex items-center justify-center gap-2">
 <svg x-show="loading" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
 <span x-text="loading ? '登录中...' : '登录'"></span>
 </button>
 </form>

 <div class="mt-6 text-center text-sm text-gray-500 dark:text-gray-400">
 <span>测试账号: </span>
 <code class="text-primary">admin / 123456</code>
 </div>
 </div>

 <p class="text-center text-xs text-gray-400 mt-6">© 2024 HatTax. All rights reserved.</p>
 </div>

 <script type="module">
 import '/style.css'
 import Alpine from 'alpinejs'

 Alpine.data('loginForm', () => ({
 username: '',
 password: '',
 remember: false,
 loading: false,
 error: '',
 fieldErrors: { username: '', password: '' },

 handleLogin() {
 this.error = ''
 this.fieldErrors = { username: '', password: '' }

 if (!this.username.trim()) {
 this.fieldErrors.username = '请输入用户名'
 return
 }
 if (!this.password) {
 this.fieldErrors.password = '请输入密码'
 return
 }

 this.loading = true

 setTimeout(() => {
 if (this.username === 'admin' && this.password === '123456') {
 if (this.remember) {
 localStorage.setItem('hatax_remember', this.username)
 }
 sessionStorage.setItem('hatax_token', 'mock-jwt-token-' + Date.now())
 location.href = '/pages/admin/dashboard.html'
 } else {
 this.error = '用户名或密码错误'
 }
 this.loading = false
 }, 800)
 }
 }))

 window.Alpine = Alpine
 Alpine.start()
   queueMicrotask(() => {
     const el = document.getElementById("page-content")
     if (el) { try { Alpine.destroyTree(el) } catch(e) {}; Alpine.initTree(el) }
   })
</script>
</body>
</html>
