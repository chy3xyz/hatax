<!-- layout: app-shell -->
<html>
<head>
  <title>AI 助手</title>
</head>
<body>
<div id="page-content" x-data="aiChat" x-cloak class="pt-28 p-6 h-[calc(100vh-7rem)] flex flex-col animate-fade-in"
     :class="$store.app.sidebarOpen ? 'lg:ml-64' : 'lg:ml-0'">

  <nav class="flex items-center gap-1 text-sm text-gray-500 dark:text-gray-400 mb-4 flex-shrink-0" aria-label="Breadcrumb">
    <a href="/pages/admin/dashboard.html" class="hover:text-primary transition-colors">首页</a>
    <span class="text-gray-300">/</span>
    <span class="text-gray-700 dark:text-gray-200 font-medium">AI 助手</span>
  </nav>

  <div class="flex-1 flex flex-col bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-700 overflow-hidden min-h-0">
    <!-- Header -->
    <div class="flex items-center gap-3 px-5 py-3 border-b border-gray-200 dark:border-gray-700 flex-shrink-0">
      <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-primary to-purple-500 flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
      </div>
      <div>
        <div class="text-sm font-semibold">HatTax AI</div>
        <div class="text-xs text-green-500">在线</div>
      </div>
      <button @click="clearChat" class="ml-auto p-1.5 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors text-gray-400 hover:text-gray-600" title="清空对话">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
      </button>
    </div>

    <!-- Messages -->
    <div id="chat-messages" class="flex-1 overflow-y-auto p-5 space-y-4" x-ref="messages">
      <template x-for="(msg, i) in messages" :key="i">
        <div :class="msg.role === 'user' ? 'flex justify-end' : 'flex gap-3'">
          <!-- AI avatar -->
          <div x-show="msg.role === 'assistant'" class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary to-purple-500 flex items-center justify-center flex-shrink-0">
            <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
          </div>
          <div :class="msg.role === 'user'
            ? 'max-w-[75%] px-4 py-2.5 bg-primary text-white rounded-2xl rounded-br-md'
            : 'max-w-[75%] px-4 py-2.5 bg-gray-100 dark:bg-gray-800 rounded-2xl rounded-bl-md'">
            <div x-show="msg.loading" class="flex gap-1 py-1">
              <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay:0s"></span>
              <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay:0.15s"></span>
              <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay:0.3s"></span>
            </div>
            <div x-show="!msg.loading" class="text-sm whitespace-pre-wrap" x-text="msg.content"></div>
            <div class="text-[10px] opacity-50 mt-1" x-text="msg.time" x-show="!msg.loading"></div>
          </div>
        </div>
      </template>
    </div>

    <!-- Input -->
    <div class="px-5 py-3 border-t border-gray-200 dark:border-gray-700 flex-shrink-0">
      <div class="flex gap-2">
        <textarea x-model="input" @keydown.enter.prevent="!e.shiftKey && sendMessage()"
          placeholder="输入消息，Enter 发送，Shift+Enter 换行..."
          rows="1" class="flex-1 px-4 py-2.5 border rounded-xl dark:bg-gray-800 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-colors resize-none"
          :disabled="sending"
          @input="$el.style.height='auto'; $el.style.height=$el.scrollHeight+'px'"></textarea>
        <button @click="sendMessage()" :disabled="sending || !input.trim()"
          class="px-4 py-2.5 bg-primary text-white rounded-xl hover:bg-primary/90 disabled:opacity-40 transition-colors flex items-center gap-1.5 flex-shrink-0">
          <svg x-show="!sending" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
          <svg x-show="sending" class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script type="module">
// Mock AI responses
const AI_RESPONSES = [
  '这是一个很好的问题。基于目前的数据分析，我建议采用分阶段实施策略，先进行 A/B 测试验证假设，再逐步推广。',
  '根据 HatTax 系统的数据分析，最近 30 天的用户活跃度提升了 12.5%。建议关注用户留存率这一核心指标。',
  '我可以帮您生成数据分析报告、自动化工作流程、或者优化数据库查询。请告诉我您具体需要什么帮助？',
  '从技术角度来说，这个功能可以通过 HTMX 的 hx-trigger 配合 Alpine.js 的响应式状态来实现，无需额外的前端框架。',
  '让我查看一下相关的文档和最佳实践...\n\n根据最新的业界标准，推荐使用以下方案：\n1. 前端使用 viem 连接 Web3 钱包\n2. 合约交互通过 writeContract 方法\n3. 交易状态通过 Alpine store 实时更新',
  '已为您查询到以下信息：系统中当前有 1,289 个活跃用户，今日新增 36 个注册。需要更详细的分析吗？',
  '好的，我已经理解了您的需求。总结一下：\n\n• 目标：提升后台管理效率\n• 范围：用户管理、数据分析\n• 优先级：高\n\n接下来我会为您制定详细的执行计划。',
]

Alpine.data('aiChat', () => ({
  messages: [
    { role: 'assistant', content: '你好！我是 HatTax AI 助手。我可以帮你分析数据、解答技术问题、生成报告。有什么可以帮到你的？', time: '刚刚', loading: false }
  ],
  input: '',
  sending: false,

  sendMessage() {
    const text = this.input.trim()
    if (!text || this.sending) return

    this.messages.push({ role: 'user', content: text, time: this._now(), loading: false })
    this.input = ''
    this.sending = true

    // Add loading message
    const loadingMsg = { role: 'assistant', content: '', time: '', loading: true }
    this.messages.push(loadingMsg)
    this.$nextTick(() => this._scrollBottom())

    // Simulate AI response delay
    const delay = 600 + Math.random() * 1500
    setTimeout(() => {
      const response = AI_RESPONSES[Math.floor(Math.random() * AI_RESPONSES.length)]
      loadingMsg.content = response
      loadingMsg.time = this._now()
      loadingMsg.loading = false
      this.sending = false
      this.$nextTick(() => this._scrollBottom())
    }, delay)
  },

  clearChat() {
    this.messages = [
      { role: 'assistant', content: '对话已清空。有什么新的问题吗？', time: this._now(), loading: false }
    ]
  },

  _now() {
    const d = new Date()
    return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`
  },

  _scrollBottom() {
    const el = this.$refs.messages
    if (el) el.scrollTop = el.scrollHeight
  }
}))
  queueMicrotask(() => {
    const el = document.getElementById("page-content")
    if (el) { try { Alpine.destroyTree(el) } catch(e) {}; Alpine.initTree(el) }
  })
</script>
</body>
</html>
