<!DOCTYPE html>
<html :class="{ 'dark': darkMode }" x-data="tasksPage()">
<head>
  <script src="/theme-boot.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <title>任务中心 — HatTax</title>
  <style>.font-ui { font-family: "DM Sans", system-ui, sans-serif; }</style>
</head>
<body class="site-shell font-ui">

<!-- include: site-nav -->

<section class="site-promo-banner"
  style="--banner-image: url('https://images.unsplash.com/photo-1484480974693-6ca0a78fb36b?auto=format&fit=crop&w=1600&q=80')">
  <span class="site-promo-badge">广告位</span>
  <div class="site-promo-inner">
    <p class="site-promo-eyebrow">Quests · 任务中心</p>
    <h1 class="site-promo-title">完成任务，攒积分兑换好课</h1>
    <p class="site-promo-desc">阅读、看视频、答题、发帖——把日常活跃变成成长收益。品牌合作可投放本页 Banner。</p>
    <div class="site-promo-actions">
      <a href="/pages/courses.html" class="site-promo-cta">去课程商城</a>
      <a href="/pages/events.html" class="site-promo-ghost">看看活动</a>
      <div class="ml-auto hidden rounded-xl bg-white/10 px-4 py-2 text-sm text-white backdrop-blur sm:block" x-show="loggedIn">
        积分 <span class="font-bold" x-text="user?.points ?? '—'"></span>
      </div>
    </div>
  </div>
</section>

<main class="mx-auto max-w-5xl px-4 py-8 sm:px-6 sm:py-10">
  <div class="catalog-toolbar">
    <div>
      <h2 class="text-base font-semibold text-stone-900 dark:text-white">全部任务</h2>
      <p class="mt-1 text-sm text-stone-500 dark:text-stone-400">选择类型后开始，完成后自动发放积分。</p>
    </div>
    <div class="site-card px-4 py-2 text-sm sm:hidden" x-show="loggedIn">
      <span class="text-stone-400">积分</span>
      <span class="ml-2 font-bold text-primary" x-text="user?.points ?? '—'"></span>
    </div>
  </div>

  <div class="catalog-filters mb-7">
    <button type="button" @click="setType('')" class="catalog-filter" :class="!type && 'catalog-filter-active'">全部</button>
    <template x-for="t in types" :key="t.key">
      <button type="button" @click="setType(t.key)" class="catalog-filter"
        :class="type === t.key && 'catalog-filter-active'" x-text="t.label"></button>
    </template>
  </div>

  <div x-show="loading" class="py-20 text-center text-stone-400">加载中…</div>
  <div x-show="error" class="py-12 text-center text-red-500" x-text="error"></div>

  <div x-show="!loading && !error" class="catalog-grid">
    <template x-for="task in filtered" :key="task.id">
      <a :href="'/pages/task.html?id=' + task.id" class="catalog-card">
        <div class="catalog-body">
          <div class="flex items-start gap-4">
            <div class="task-card-icon" x-html="typeIcon(task.type)"></div>
            <div class="min-w-0 flex-1">
              <div class="flex flex-wrap items-center gap-2">
                <span class="site-chip" x-text="task.typeLabel"></span>
                <span class="rounded-full px-2 py-0.5 text-[11px] font-medium"
                  :class="statusClass(task)" x-text="statusText(task)"></span>
              </div>
              <h2 class="catalog-title mt-2.5" x-text="task.title"></h2>
              <p class="catalog-desc mt-1.5" x-text="task.description"></p>
            </div>
            <div class="shrink-0 rounded-2xl bg-primary/8 px-3 py-2 text-center dark:bg-primary/15">
              <p class="text-lg font-bold leading-none text-primary">+<span x-text="task.rewardPoints"></span></p>
              <p class="mt-1 text-[10px] uppercase tracking-wider text-stone-400">积分</p>
            </div>
          </div>
          <div class="catalog-meta">
            <span x-text="task.repeatable ? '可重复完成' : '单次任务'"></span>
            <span class="catalog-cta">去完成 <span aria-hidden="true">→</span></span>
          </div>
        </div>
      </a>
    </template>
  </div>

  <p x-show="!loading && !filtered.length" class="py-16 text-center text-stone-400">暂无任务</p>
</main>

<script type="module">
import Alpine from 'alpinejs'
import { siteChrome } from '/src/public/site.js'
import { apiFetch, getUser, setUser, isLoggedIn } from '/src/public/api.js'

const TYPE_ICONS = {
  read: '<svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 19.5A2.5 2.5 0 006.5 22H20V4H6.5A2.5 2.5 0 004 6.5v13zM8 8h8M8 12h6"/></svg>',
  video: '<svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10l4.55-2.27A1 1 0 0121 8.62v6.76a1 1 0 01-1.45.89L15 14M4 7h9a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V9a2 2 0 012-2z"/></svg>',
  audio: '<svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 18V6l10-2v12M9 18a3 3 0 11-6 0 3 3 0 016 0zm10-2a3 3 0 11-6 0 3 3 0 016 0z"/></svg>',
  quiz: '<svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.2 9.2A3.2 3.2 0 0112 6.4a3 3 0 012.9 2.2c.3 1.1-.2 2-1.1 2.7-.9.7-1.8 1.2-1.8 2.4M12 17.5h.01M12 22a10 10 0 110-20 10 10 0 010 20z"/></svg>',
  post: '<svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 10h8M8 14h5M21 12a9 9 0 11-3.2-6.9L21 5v7z"/></svg>',
}

window.tasksPage = function tasksPage() {
  return {
    ...siteChrome('tasks'),
    loading: true,
    error: '',
    rows: [],
    type: '',
    types: [
      { key: 'read', label: '阅读' },
      { key: 'video', label: '视频' },
      { key: 'audio', label: '音频' },
      { key: 'quiz', label: '答题' },
      { key: 'post', label: '发帖' },
    ],
    get filtered() {
      if (!this.type) return this.rows
      return this.rows.filter((t) => t.type === this.type)
    },
    async init() {
      if (isLoggedIn()) {
        const me = await apiFetch('/api/community/me')
        if (me.json.code === 0) {
          setUser({
            id: me.json.data.id,
            username: me.json.data.username,
            displayName: me.json.data.displayName,
            points: me.json.data.points,
          })
          this.user = getUser()
        }
      }
      const { json } = await apiFetch('/api/tasks')
      this.loading = false
      if (json.code !== 0) {
        this.error = json.msg || '加载失败'
        return
      }
      this.rows = json.data || []
    },
    setType(t) { this.type = t },
    typeIcon(type) { return TYPE_ICONS[type] || TYPE_ICONS.read },
    statusText(task) {
      const s = task.progress?.status
      if (s === 'completed') return '已完成'
      if (s === 'in_progress') return '进行中'
      return '未开始'
    },
    statusClass(task) {
      const s = task.progress?.status
      if (s === 'completed') return 'bg-emerald-100 text-emerald-700 dark:bg-emerald-950/50 dark:text-emerald-300'
      if (s === 'in_progress') return 'bg-amber-100 text-amber-800 dark:bg-amber-950/40 dark:text-amber-200'
      return 'bg-stone-100 text-stone-500 dark:bg-stone-800'
    },
  }
}
Alpine.start()
</script>
</body>
</html>
