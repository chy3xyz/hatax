<!DOCTYPE html>
<html :class="{ 'dark': darkMode }" x-data="messagesPage()">
<head>
  <script src="/theme-boot.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <title>私信 — HatTax</title>
  <style>.font-ui { font-family: "DM Sans", system-ui, sans-serif; }</style>
</head>
<body class="site-shell font-ui">

<!-- include: site-nav -->

<main class="mx-auto max-w-5xl px-4 py-8 sm:px-6">
  <div class="grid gap-4 lg:grid-cols-12" style="min-height: 28rem">
    <aside class="site-card overflow-hidden lg:col-span-4">
      <div class="border-b border-stone-200 px-4 py-3 text-sm font-semibold dark:border-stone-800">会话</div>
      <div x-show="!conversations.length" class="px-4 py-12 text-center text-sm text-stone-400">还没有私信</div>
      <template x-for="c in conversations" :key="c.id">
        <button type="button" @click="openConv(c.id)"
          class="flex w-full items-start gap-3 border-b border-stone-100 px-4 py-3 text-left transition hover:bg-stone-50 dark:border-stone-800 dark:hover:bg-stone-800/40"
          :class="activeId === c.id && 'bg-stone-100 dark:bg-stone-800'">
          <div class="flex h-9 w-9 flex-shrink-0 items-center justify-center rounded-full bg-stone-800 text-xs font-bold text-white dark:bg-stone-200 dark:text-stone-900"
            x-text="avatarChar(c.other?.displayName)"></div>
          <div class="min-w-0 flex-1">
            <div class="flex items-center justify-between gap-2">
              <span class="truncate text-sm font-semibold" x-text="c.other?.displayName"></span>
              <span x-show="c.unread" class="rounded-full bg-primary px-1.5 text-[10px] font-bold text-white" x-text="c.unread"></span>
            </div>
            <p class="mt-0.5 truncate text-xs text-stone-400" x-text="c.lastBody || '（空会话）'"></p>
          </div>
        </button>
      </template>
    </aside>

    <section class="site-card flex flex-col lg:col-span-8">
      <template x-if="!thread">
        <div class="flex flex-1 items-center justify-center p-10 text-sm text-stone-400">选择左侧会话，或从用户主页发起私信</div>
      </template>
      <template x-if="thread">
        <div class="flex h-full min-h-[28rem] flex-col">
          <div class="flex items-center justify-between border-b border-stone-200 px-5 py-3 dark:border-stone-800">
            <a :href="'/pages/user.html?id=' + thread.other?.id" class="font-semibold hover:text-primary" x-text="thread.other?.displayName"></a>
            <button type="button" @click="toggleDark()" class="text-sm text-stone-400">◐</button>
          </div>
          <div class="flex-1 space-y-3 overflow-y-auto px-5 py-4" x-ref="scroller">
            <template x-for="m in thread.messages" :key="m.id">
              <div class="flex" :class="Number(m.senderId) === myId ? 'justify-end' : 'justify-start'">
                <div class="max-w-[80%] rounded-2xl px-3.5 py-2 text-sm"
                  :class="Number(m.senderId) === myId ? 'bg-primary text-white' : 'bg-stone-100 dark:bg-stone-800'">
                  <p class="whitespace-pre-wrap break-words" x-text="m.body"></p>
                  <p class="mt-1 text-[10px] opacity-70" x-text="formatDate(m.createdAt, true)"></p>
                </div>
              </div>
            </template>
          </div>
          <form @submit.prevent="send()" class="flex gap-2 border-t border-stone-200 p-4 dark:border-stone-800">
            <input x-model="draft" class="flex-1 rounded-xl border border-stone-200 bg-transparent px-3 py-2.5 text-sm dark:border-stone-700" placeholder="输入消息…">
            <button type="submit" :disabled="sending || !draft.trim()" class="rounded-xl bg-primary px-4 py-2 text-sm font-semibold text-white disabled:opacity-50">发送</button>
          </form>
        </div>
      </template>
    </section>
  </div>
</main>

<script type="module">
import Alpine from 'alpinejs'
import { siteChrome, formatDate, avatarChar } from '/src/public/site.js'
import { apiFetch, isLoggedIn, loginUrl, qs, getUser } from '/src/public/api.js'

function messagesPage() {
  return {
    ...siteChrome('forum'),
    formatDate,
    avatarChar,
    conversations: [],
    activeId: null,
    thread: null,
    draft: '',
    sending: false,
    myId: getUser()?.id || null,
    async init() {
      if (!isLoggedIn()) {
        location.replace(loginUrl('/pages/messages.html' + location.search))
        return
      }
      await this.loadList()
      const id = qs('id')
      if (id) await this.openConv(Number(id))
    },
    async loadList() {
      const { json } = await apiFetch('/api/community/dm/conversations')
      if (json.code === 0) this.conversations = json.data || []
    },
    async openConv(id) {
      this.activeId = Number(id)
      const { json } = await apiFetch('/api/community/dm/conversations/' + id)
      if (json.code !== 0) return
      this.thread = json.data
      this.myId = getUser()?.id || this.myId
      await this.loadList()
      this.$nextTick(() => {
        const el = this.$refs.scroller
        if (el) el.scrollTop = el.scrollHeight
      })
    },
    async send() {
      if (!this.draft.trim() || !this.activeId) return
      this.sending = true
      const { json } = await apiFetch('/api/community/dm/messages', {
        method: 'POST',
        body: JSON.stringify({ conversationId: this.activeId, body: this.draft }),
      })
      this.sending = false
      if (json.code === 0) {
        this.draft = ''
        await this.openConv(this.activeId)
      }
    },
  }
}

window.Alpine = Alpine
Alpine.data('messagesPage', messagesPage)
Alpine.start()
</script>
</body>
</html>
