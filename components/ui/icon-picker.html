<div x-data="iconPicker"
     @icon-picked.window="selected = $event.detail"
     class="relative">
  <label class="block text-sm font-medium mb-1.5">图标</label>
  <button type="button" @click="open = !open" class="w-full flex items-center gap-2 px-4 py-2.5 border rounded-lg dark:bg-gray-800 dark:border-gray-600 hover:border-primary transition-colors">
    <div class="w-6 h-6 text-gray-600 dark:text-gray-300" x-html="selected ? `<svg class=\\'w-6 h-6\\' fill=\\'none\\' stroke=\\'currentColor\\' viewBox=\\'0 0 24 24\\'><path stroke-linecap=\\'round\\' stroke-linejoin=\\'round\\' stroke-width=\\'2\\' d=\\'${getIconPath(selected)}\\'></path></svg>` : ''"></div>
    <span class="flex-1 text-left text-sm text-gray-500" x-text="selected || '请选择图标'"></span>
    <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
  </button>

  <div x-show="open" @click.outside="open = false" x-transition class="absolute left-0 right-0 mt-1 bg-white dark:bg-gray-800 rounded-xl shadow-2xl border border-gray-200 dark:border-gray-700 z-50">
    <div class="p-3 border-b border-gray-200 dark:border-gray-700">
      <input type="text" x-model="selected" @input="filterIcons()" placeholder="搜索图标名称..." class="w-full px-3 py-2 text-sm border rounded-lg dark:bg-gray-900 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary">
    </div>
    <div class="p-2 max-h-64 overflow-y-auto">
      <div class="grid grid-cols-6 gap-1">
        <template x-for="icon in icons.filter(i => i.includes(selected.toLowerCase()) || !selected)" :key="icon">
          <button type="button"
            @click="pick(icon)"
            class="aspect-square flex items-center justify-center rounded-lg hover:bg-primary/10 hover:text-primary transition-colors text-gray-600 dark:text-gray-300"
            :class="selected === icon ? 'bg-primary/15 text-primary' : ''"
            :title="icon">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" :d="getIconPath(icon)"></path></svg>
          </button>
        </template>
      </div>
    </div>
  </div>
  <input type="hidden" :value="selected">
</div>
