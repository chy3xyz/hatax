<div x-data="drawer"
     x-show="open"
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="fixed inset-0 z-50">
  <div class="absolute inset-0 bg-black/40" @click="closeDrawer()"></div>
  <div
    :class="placement === 'right' ? 'right-0 top-0 bottom-0' : 'left-0 top-0 bottom-0'"
    x-show="open"
    x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="translate-x-full"
    x-transition:enter-end="translate-x-0"
    x-transition:leave="transition ease-in duration-200"
    x-transition:leave-start="translate-x-0"
    x-transition:leave-end="translate-x-full"
    :style="`width:${size}px; max-width:100vw`"
    class="absolute bg-white dark:bg-gray-900 shadow-2xl flex flex-col">
    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200 dark:border-gray-700 flex-shrink-0">
      <h3 class="text-base font-semibold" x-text="title"></h3>
      <button @click="closeDrawer()" class="p-1 hover:bg-gray-100 dark:hover:bg-gray-800 rounded transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
    </div>
    <!-- Body -->
    <div class="flex-1 overflow-y-auto p-6">
      <slot></slot>
      <!-- Default slot content when used standalone -->
      <div x-show="!$slots.default" class="text-gray-500 text-sm">抽屉内容区域，请在父组件中使用 slot 传入内容</div>
    </div>
    <!-- Footer -->
    <div class="px-6 py-4 border-t border-gray-200 dark:border-gray-700 flex justify-end gap-3 flex-shrink-0">
      <button @click="closeDrawer()" class="px-5 py-2 border rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-sm">取消</button>
      <button @click="$dispatch('drawer-confirm'); closeDrawer()" class="px-5 py-2 bg-primary text-white rounded-lg hover:bg-primary/90 transition-colors text-sm">确定</button>
    </div>
  </div>
</div>
