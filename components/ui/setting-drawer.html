<div x-data="settingDrawer"
     x-show="open"
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="fixed inset-0 z-[9998]"
     @open-setting.window="openDrawer()">
  <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" @click="closeDrawer()"></div>
  <div class="absolute right-0 top-0 bottom-0 w-[420px] max-w-[100vw] bg-white dark:bg-gray-900 shadow-2xl flex flex-col overflow-hidden"
       x-show="open"
       x-transition:enter="transition ease-out duration-300"
       x-transition:enter-start="translate-x-full"
       x-transition:enter-end="translate-x-0"
       x-transition:leave="transition ease-in duration-200"
       x-transition:leave-start="translate-x-0"
       x-transition:leave-end="translate-x-full">
    <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200 dark:border-gray-700">
      <h3 class="text-base font-semibold">界面设置</h3>
      <button @click="closeDrawer()" class="p-1.5 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
    </div>
    <div class="flex-1 overflow-y-auto p-6 space-y-8">

      <!-- 主题颜色 -->
      <section>
        <div class="flex items-center justify-between mb-4">
          <div>
            <div class="text-sm font-medium">主题颜色</div>
            <div class="text-xs text-gray-400 mt-0.5">选择全局主题色调</div>
          </div>
        </div>
        <div class="grid grid-cols-4 gap-3">
          <template x-for="c in themeColors" :key="c.key">
            <button
              @click="setThemeColor(c.color, c.key)"
              class="group relative flex flex-col items-center gap-1.5 p-3 rounded-xl border-2 transition-all hover:scale-105"
              :class="$store.app.themeColor === c.color ? 'border-primary shadow-md' : 'border-gray-200 dark:border-gray-700 hover:border-gray-300'"
              :style="`background:${c.color}20`">
              <div class="w-8 h-8 rounded-lg flex items-center justify-center" :style="`background:${c.color}`">
                <svg x-show="$store.app.themeColor === c.color" class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
              </div>
              <span class="text-[11px] font-medium text-gray-600 dark:text-gray-300" x-text="c.name"></span>
            </button>
          </template>
        </div>
        <div class="mt-3">
          <label class="block text-xs text-gray-400 mb-1.5">自定义颜色</label>
          <div class="flex gap-2">
            <input type="color" x-model="customColor" class="w-10 h-10 rounded-lg border cursor-pointer" @change="setThemeColor(customColor, 'custom')">
            <input type="text" x-model="customColor" placeholder="#1890ff" class="flex-1 px-3 py-2 border rounded-lg text-sm dark:bg-gray-800 dark:border-gray-600 font-mono">
            <button @click="setThemeColor(customColor, 'custom')" class="px-3 py-2 bg-primary text-white rounded-lg text-sm hover:bg-primary/90 transition-colors">应用</button>
          </div>
        </div>
      </section>

      <!-- 暗黑模式 -->
      <section>
        <div class="text-sm font-medium mb-4">显示模式</div>
        <div class="grid grid-cols-3 gap-3">
          <button @click="$store.app.setDarkMode(false); applySettings()"
                  class="flex flex-col items-center gap-2 p-4 rounded-xl border-2 transition-all"
                  :class="!$store.app.dark ? 'border-primary shadow-md bg-primary/5' : 'border-gray-200 dark:border-gray-700 hover:border-gray-300'">
            <svg class="w-8 h-8 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            <span class="text-xs font-medium" :class="!$store.app.dark ? 'text-primary' : 'text-gray-500'">浅色</span>
          </button>
          <button @click="$store.app.setDarkMode(true); applySettings()"
                  class="flex flex-col items-center gap-2 p-4 rounded-xl border-2 transition-all"
                  :class="$store.app.dark ? 'border-primary shadow-md bg-primary/5' : 'border-gray-200 dark:border-gray-700 hover:border-gray-300'">
            <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            <span class="text-xs font-medium" :class="$store.app.dark ? 'text-primary' : 'text-gray-500'">深色</span>
          </button>
          <button @click="toggleSystemTheme()"
                  class="flex flex-col items-center gap-2 p-4 rounded-xl border-2 border-gray-200 dark:border-gray-700 hover:border-gray-300 transition-all">
            <svg class="w-8 h-8 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
            <span class="text-xs font-medium text-gray-500">跟随系统</span>
          </button>
        </div>
      </section>

      <!-- 侧边栏 -->
      <section>
        <div class="text-sm font-medium mb-4">侧边栏</div>
        <div class="space-y-4">
          <div class="flex items-center justify-between">
            <div>
              <div class="text-sm">固定侧边栏</div>
              <div class="text-xs text-gray-400">滚动时保持侧边栏可见</div>
            </div>
            <button @click="sidebarFixed = !sidebarFixed; applySettings()"
                    class="relative w-11 h-6 rounded-full transition-colors" :class="sidebarFixed ? 'bg-primary' : 'bg-gray-300 dark:bg-gray-600'">
              <span class="absolute top-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform" :class="sidebarFixed ? 'translate-x-5' : 'translate-x-0.5'"></span>
            </button>
          </div>
          <div class="flex items-center justify-between">
            <div>
              <div class="text-sm">折叠按钮</div>
              <div class="text-xs text-gray-400">显示侧边栏展开/折叠开关</div>
            </div>
            <button @click="sidebarToggle = !sidebarToggle; applySettings()"
                    class="relative w-11 h-6 rounded-full transition-colors" :class="sidebarToggle ? 'bg-primary' : 'bg-gray-300 dark:bg-gray-600'">
              <span class="absolute top-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform" :class="sidebarToggle ? 'translate-x-5' : 'translate-x-0.5'"></span>
            </button>
          </div>
          <div>
            <div class="text-sm mb-2">侧边栏宽度</div>
            <div class="flex gap-2">
              <template x-for="w in [200, 220, 240, 260]" :key="w">
                <button @click="sidebarWidth = w; applySettings()"
                        class="px-3 py-1.5 text-xs rounded-lg border transition-colors"
                        :class="sidebarWidth === w ? 'bg-primary text-white border-primary' : 'border-gray-200 dark:border-gray-700 hover:border-primary'">
                  <span x-text="w + 'px'"></span>
                </button>
              </template>
            </div>
          </div>
        </div>
      </section>

      <!-- 过渡动画 -->
      <section>
        <div class="text-sm font-medium mb-4">过渡动画</div>
        <div class="space-y-3">
          <div>
            <div class="text-xs text-gray-400 mb-2">动画时长</div>
            <div class="flex gap-2">
              <template x-for="s in [{v:0,l:'关闭'},{v:150,l:'快速'},{v:300,l:'正常'},{v:500,l:'缓慢'}]" :key="s.v">
                <button @click="transitionDuration = s.v; applySettings()"
                        class="px-3 py-1.5 text-xs rounded-lg border transition-colors"
                        :class="transitionDuration === s.v ? 'bg-primary text-white border-primary' : 'border-gray-200 dark:border-gray-700 hover:border-primary'">
                  <span x-text="s.l"></span>
                </button>
              </template>
            </div>
          </div>
          <div>
            <div class="text-xs text-gray-400 mb-2">动画类型</div>
            <select x-model="transitionType" @change="applySettings()" class="w-full px-3 py-2 border rounded-lg text-sm dark:bg-gray-800 dark:border-gray-600">
              <option value="fade">渐变 Fade</option>
              <option value="slide">滑动 Slide</option>
              <option value="zoom">缩放 Zoom</option>
            </select>
          </div>
        </div>
      </section>

      <!-- 标签页 -->
      <section>
        <div class="text-sm font-medium mb-4">标签页</div>
        <div class="space-y-4">
          <div class="flex items-center justify-between">
            <div>
              <div class="text-sm">显示标签页</div>
              <div class="text-xs text-gray-400">顶部显示多标签导航栏</div>
            </div>
            <button @click="showTabs = !showTabs; applySettings()"
                    class="relative w-11 h-6 rounded-full transition-colors" :class="showTabs ? 'bg-primary' : 'bg-gray-300 dark:bg-gray-600'">
              <span class="absolute top-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform" :class="showTabs ? 'translate-x-5' : 'translate-x-0.5'"></span>
            </button>
          </div>
          <div class="flex items-center justify-between">
            <div>
              <div class="text-sm">标签页持久化</div>
              <div class="text-xs text-gray-400">刷新后保留打开的标签页</div>
            </div>
            <button @click="tabPersist = !tabPersist; applySettings()"
                    class="relative w-11 h-6 rounded-full transition-colors" :class="tabPersist ? 'bg-primary' : 'bg-gray-300 dark:bg-gray-600'">
              <span class="absolute top-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform" :class="tabPersist ? 'translate-x-5' : 'translate-x-0.5'"></span>
            </button>
          </div>
        </div>
      </section>

      <!-- 界面功能 -->
      <section>
        <div class="text-sm font-medium mb-4">界面功能</div>
        <div class="space-y-4">
          <div class="flex items-center justify-between">
            <div>
              <div class="text-sm">固定头部</div>
              <div class="text-xs text-gray-400">顶部导航栏固定在顶部</div>
            </div>
            <button @click="fixedHeader = !fixedHeader; applySettings()"
                    class="relative w-11 h-6 rounded-full transition-colors" :class="fixedHeader ? 'bg-primary' : 'bg-gray-300 dark:bg-gray-600'">
              <span class="absolute top-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform" :class="fixedHeader ? 'translate-x-5' : 'translate-x-0.5'"></span>
            </button>
          </div>
          <div class="flex items-center justify-between">
            <div>
              <div class="text-sm">固定底部</div>
              <div class="text-xs text-gray-400">页脚固定在底部</div>
            </div>
            <button @click="fixedFooter = !fixedFooter; applySettings()"
                    class="relative w-11 h-6 rounded-full transition-colors" :class="fixedFooter ? 'bg-primary' : 'bg-gray-300 dark:bg-gray-600'">
              <span class="absolute top-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform" :class="fixedFooter ? 'translate-x-5' : 'translate-x-0.5'"></span>
            </button>
          </div>
        </div>
      </section>

      <!-- 重置 -->
      <div class="pt-4 border-t border-gray-200 dark:border-gray-700">
        <button @click="resetSettings()" class="w-full py-2.5 border border-red-200 dark:border-red-800 text-red-500 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/10 transition-colors text-sm font-medium">
          重置所有设置
        </button>
      </div>
    </div>
  </div>
</div>
