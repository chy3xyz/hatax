<div class="fixed top-16 left-0 right-0 z-20 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-700 transition-all duration-300"
     :class="$store.app.sidebarOpen ? 'lg:left-64' : 'lg:left-0'">
  <!-- Tabs row with scroll -->
  <div class="flex items-center" x-data="{ scroller: null, hasLeft: false, hasRight: false }"
       x-init="
         scroller = $el.querySelector('.tabs-scroll');
         const update = () => {
           if (!scroller) return;
           hasLeft = scroller.scrollLeft > 2;
           hasRight = scroller.scrollLeft + scroller.clientWidth < scroller.scrollWidth - 2;
         };
         update();
         scroller?.addEventListener('scroll', update);
         $watch('$store.app.tabs', () => $nextTick(update));
       ">
    <!-- Left fade -->
    <div x-show="hasLeft" class="absolute left-0 top-0 bottom-0 w-8 bg-gradient-to-r from-white dark:from-gray-900 to-transparent z-10 pointer-events-none"></div>
    <!-- Right fade -->
    <div x-show="hasRight" class="absolute right-0 top-0 bottom-0 w-8 bg-gradient-to-l from-white dark:from-gray-900 to-transparent z-10 pointer-events-none"></div>

    <!-- Left scroll button -->
    <button x-show="hasLeft" @click="scroller.scrollBy({ left: -160, behavior: 'smooth' })" class="flex-shrink-0 p-2 hover:bg-gray-100 dark:hover:bg-gray-800 z-20 transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
    </button>

    <div class="tabs-scroll flex items-center gap-0.5 overflow-x-auto px-3 py-1.5 scroll-smooth" style="scrollbar-width:none">
      <template x-for="(tab, i) in $store.app.tabs" :key="tab.name">
        <div class="flex items-center flex-shrink-0 group"
             :class="tab.active
               ? 'bg-white dark:bg-gray-900 border border-b-0 border-gray-200 dark:border-gray-700 rounded-t-lg -mb-px'
               : 'border border-transparent rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800'">
          <button
            @click="if(!tab.active){ $store.app.addTab(tab.name, tab.title); location.href='/pages/'+tab.name+'.html' }"
            class="flex items-center gap-1.5 px-3 py-1.5 text-sm transition-colors"
            :class="tab.active ? 'text-primary font-medium' : 'text-gray-500 hover:text-gray-700 dark:hover:text-gray-300'">
            <span x-text="tab.title"></span>
          </button>
          <!-- Close button -->
          <button
            x-show="$store.app.tabs.length > 1"
            @click.stop="$store.app.closeTab(i)"
            class="p-0.5 mr-1.5 rounded hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors opacity-0 group-hover:opacity-100"
            :class="tab.active ? 'opacity-100' : ''">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
          </button>
        </div>
      </template>
    </div>

    <!-- Right scroll button -->
    <button x-show="hasRight" @click="scroller.scrollBy({ left: 160, behavior: 'smooth' })" class="flex-shrink-0 p-2 hover:bg-gray-100 dark:hover:bg-gray-800 z-20 transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
    </button>

    <!-- More tabs dropdown -->
    <div class="relative flex-shrink-0" x-data="{ open: false }" x-show="$store.app.tabs.length > 5">
      <button @click="open = !open" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors">
        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z"></path></svg>
      </button>
      <div x-show="open" @click.outside="open = false" x-transition class="absolute right-0 top-full mt-1 w-40 bg-white dark:bg-gray-800 rounded-lg shadow-xl border border-gray-200 dark:border-gray-700 py-1 z-50">
        <template x-for="tab in $store.app.tabs.slice(5)" :key="tab.name">
          <button @click="$store.app.closeTab($store.app.tabs.indexOf(tab)); open = false"
                  class="w-full flex items-center justify-between px-3 py-2 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
                  :class="tab.active ? 'text-primary' : ''">
            <span x-text="tab.title"></span>
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
          </button>
        </template>
      </div>
    </div>

    <!-- Refresh current tab -->
    <button @click="Alpine.notify.info('刷新页面...'); location.reload()" class="flex-shrink-0 p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors ml-1" title="刷新当前页">
      <svg class="w-4 h-4 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
    </button>
  </div>
</div>
