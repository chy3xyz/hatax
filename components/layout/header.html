<link rel="html" href="/components/layout/sidebar.html">
<link rel="html" href="/components/layout/breadcrumb.html">

<div class="fixed top-0 left-0 right-0 h-16 bg-white dark:bg-gray-900 border-b z-30 px-4 flex items-center justify-between transition-all duration-300 shadow-sm"
     :class="{ 'shadow-md': scrolled, 'lg:left-64': $store.app.sidebarOpen, 'lg:left-0': !$store.app.sidebarOpen }"
     x-data="{ scrolled: false, isMobile: window.innerWidth < 1024 }"
     @scroll.window="scrolled = window.scrollY > 0"
     @resize.window="isMobile = window.innerWidth < 1024">
  <div class="flex items-center gap-3">
    <!-- Mobile: hamburger / Desktop: toggle -->
    <button @click="isMobile ? ($store.app.mobileMenuOpen = !$store.app.mobileMenuOpen) : ($store.app.sidebarOpen = !$store.app.sidebarOpen)"
            class="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors flex-shrink-0">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
    </button>
    <div class="hidden md:flex items-center gap-2 bg-gray-100 dark:bg-gray-800 rounded-lg px-3 py-1.5 text-sm text-gray-400 cursor-pointer hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors" @click="$store.app.openCommandPalette()">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
      <span>搜索菜单...</span>
      <kbd class="ml-2 px-1.5 py-0.5 bg-white dark:bg-gray-700 border rounded text-xs font-mono shadow-sm">⌘K</kbd>
    </div>
  </div>

  <div class="flex items-center gap-1.5">
    <!-- 主题色切换 -->
    <div class="relative" x-data="{ open: false }">
      <button @click.stop="open = !open" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors" title="切换主题色">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"></path></svg>
      </button>
      <div x-cloak style="display:none" x-show="open" @click.outside="open = false" x-transition class="absolute right-0 mt-2 w-52 bg-white dark:bg-gray-800 rounded-xl shadow-2xl border border-gray-200 dark:border-gray-700 p-3 z-50">
        <div class="text-xs font-medium text-gray-400 mb-2 px-1">主题颜色</div>
        <div class="grid grid-cols-4 gap-2">
          <template x-for="c in [
            {name:'拂晓蓝',v:'#1890ff'},{name:'火山红',v:'#ff4d4f'},{name:'日暮金',v:'#faad14'},
            {name:'极客绿',v:'#52c41a'},{name:'紫罗兰',v:'#722ed1'},{name:'粉晶色',v:'#eb2f96'},
            {name:'深空灰',v:'#1f1f1f'}
          ]" :key="c.v">
            <button
              @click="$store.app.setThemeColor(c.v); open = false"
              class="group relative w-10 h-10 rounded-lg flex items-center justify-center transition-transform hover:scale-110"
              :style="`background:${c.v}`"
              :title="c.name">
              <svg x-show="$store.app.themeColor === c.v" class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
              <div class="absolute -bottom-6 left-1/2 -translate-x-1/2 text-xs text-gray-500 opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none" x-text="c.name"></div>
            </button>
          </template>
        </div>
        <div class="mt-3 pt-3 border-t border-gray-200 dark:border-gray-700">
          <div class="flex items-center justify-between px-1">
            <span class="text-xs text-gray-400">暗黑模式</span>
            <button @click="$store.app.toggleDark(); open = false" class="relative w-10 h-5 rounded-full transition-colors" :class="$store.app.dark ? 'bg-primary' : 'bg-gray-300'">
              <span class="absolute top-0.5 w-4 h-4 bg-white rounded-full shadow transition-transform" :class="$store.app.dark ? 'translate-x-5' : 'translate-x-0.5'"></span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- 全屏 -->
    <button @click="toggleFullscreen()" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors" title="全屏">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
    </button>

    <!-- 通知 -->
    <div class="relative" x-data="{ open: false, count: 3 }">
      <button @click.stop="open = !open" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors relative" title="通知">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
        <span x-show="count > 0" x-text="count" class="absolute -top-0.5 -right-0.5 w-4 h-4 bg-red-500 text-white text-[10px] rounded-full flex items-center justify-center font-bold" x-transition></span>
      </button>
      <div x-cloak style="display:none" x-show="open" @click.outside="open = false" x-transition class="absolute right-0 mt-2 w-80 bg-white dark:bg-gray-800 rounded-xl shadow-2xl border border-gray-200 dark:border-gray-700 z-50">
        <div class="px-4 py-3 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
          <span class="font-semibold text-sm">通知中心</span>
          <button class="text-xs text-primary hover:underline">全部已读</button>
        </div>
        <div class="max-h-72 overflow-y-auto divide-y divide-gray-100 dark:divide-gray-700">
          <div class="px-4 py-3 hover:bg-gray-50 dark:hover:bg-gray-700/50 cursor-pointer transition-colors">
            <div class="flex items-start gap-2">
              <div class="w-2 h-2 bg-red-500 rounded-full mt-2 flex-shrink-0"></div>
              <div class="flex-1 min-w-0">
                <div class="text-sm font-medium">系统更新通知</div>
                <div class="text-xs text-gray-500 mt-0.5">HatTax v1.0.0 已发布，包含多项功能优化</div>
                <div class="text-xs text-gray-400 mt-1">3 分钟前</div>
              </div>
            </div>
          </div>
          <div class="px-4 py-3 hover:bg-gray-50 dark:hover:bg-gray-700/50 cursor-pointer transition-colors">
            <div class="flex items-start gap-2">
              <div class="w-2 h-2 bg-blue-500 rounded-full mt-2 flex-shrink-0"></div>
              <div class="flex-1 min-w-0">
                <div class="text-sm font-medium">新用户注册</div>
                <div class="text-xs text-gray-500 mt-0.5">用户 张伟 刚刚完成了注册</div>
                <div class="text-xs text-gray-400 mt-1">15 分钟前</div>
              </div>
            </div>
          </div>
          <div class="px-4 py-3 hover:bg-gray-50 dark:hover:bg-gray-700/50 cursor-pointer transition-colors">
            <div class="flex items-start gap-2">
              <div class="w-2 h-2 bg-green-500 rounded-full mt-2 flex-shrink-0"></div>
              <div class="flex-1 min-w-0">
                <div class="text-sm font-medium">任务完成</div>
                <div class="text-xs text-gray-500 mt-0.5">月度报告已生成完成</div>
                <div class="text-xs text-gray-400 mt-1">1 小时前</div>
              </div>
            </div>
          </div>
        </div>
        <div class="px-4 py-2.5 border-t border-gray-200 dark:border-gray-700 text-center">
          <button class="text-sm text-primary hover:underline">查看全部通知</button>
        </div>
      </div>
    </div>

    <!-- 用户下拉 -->
    <div class="relative" x-data="{ open: false }">
      <button @click.stop="open = !open" class="flex items-center gap-2 p-1.5 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors">
        <div class="w-8 h-8 rounded-full bg-primary/20 text-primary flex items-center justify-center font-medium text-sm">管</div>
        <span class="hidden md:inline text-sm font-medium">管理员</span>
        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
      </button>
      <div x-cloak style="display:none" x-show="open" @click.outside="open = false" x-transition class="absolute right-0 mt-2 w-48 bg-white dark:bg-gray-800 rounded-xl shadow-2xl border border-gray-200 dark:border-gray-700 py-1 z-50">
        <a href="/pages/profile.html" @click="open=false;$store.app.addTab('profile','个人中心');$store.app.setBreadcrumbs([{title:'个人中心',path:'/pages/profile.html'}])" class="flex items-center gap-2 px-4 py-2 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
          个人中心
        </a>
        <a href="/pages/profile.html" @click="open=false" class="flex items-center gap-2 px-4 py-2 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
          账号设置
        </a>
        <div class="border-t border-gray-200 dark:border-gray-700 my-1"></div>
        <button onclick="sessionStorage.removeItem('hatax_token');location.href='/pages/login.html'" class="w-full flex items-center gap-2 px-4 py-2 text-sm text-red-500 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
          退出登录
        </button>
      </div>
    </div>
  </div>
</div>

<!-- 全局 Loading -->
<div x-show="$store.app.loading" class="global-loading">
  <div class="w-10 h-10 border-4 border-primary/30 border-t-primary rounded-full animate-spin"></div>
</div>

<!-- 命令面板 -->
<div x-data="commandPalette"
     x-show="$store.app.commandPaletteOpen"
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="fixed inset-0 z-[9999] flex items-start justify-center pt-[15vh]">
  <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" @click="$store.app.commandPaletteOpen = false"></div>
  <div class="relative w-full max-w-lg bg-white dark:bg-gray-900 rounded-2xl shadow-2xl border border-gray-200 dark:border-gray-700 overflow-hidden"
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0 scale-95"
       x-transition:enter-end="opacity-100 scale-100">
    <div class="flex items-center gap-3 px-4 py-3 border-b border-gray-200 dark:border-gray-700">
      <svg class="w-5 h-5 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
      <input id="cmd-input" type="text" x-model="query" @input="getResults()" placeholder="搜索菜单或操作..." class="flex-1 bg-transparent outline-none text-base">
      <kbd class="px-1.5 py-0.5 bg-gray-100 dark:bg-gray-800 border rounded text-xs text-gray-400">ESC</kbd>
    </div>
    <div class="max-h-80 overflow-y-auto p-2">
      <template x-if="!query.trim()">
        <div>
          <div class="px-3 py-1.5 text-xs font-medium text-gray-400">快捷菜单</div>
          <template x-for="item in results" :key="item.name">
            <button @click="navigate(item)" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-left">
              <div class="w-8 h-8 rounded-lg bg-primary/10 text-primary flex items-center justify-center flex-shrink-0" x-html="item.icon"></div>
              <div class="flex-1 min-w-0">
                <div class="text-sm font-medium" x-text="item.title"></div>
                <div class="text-xs text-gray-400" x-text="'/' + item.name"></div>
              </div>
              <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </button>
          </template>
        </div>
      </template>
      <template x-if="query.trim() && results.length">
        <div>
          <template x-for="item in results" :key="item.name">
            <button @click="navigate(item)" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-left">
              <div class="w-8 h-8 rounded-lg bg-primary/10 text-primary flex items-center justify-center flex-shrink-0" x-html="item.icon"></div>
              <div class="flex-1 min-w-0">
                <div class="text-sm font-medium" x-text="item.title"></div>
                <div class="text-xs text-gray-400" x-text="item.name"></div>
              </div>
            </button>
          </template>
        </div>
      </template>
      <template x-if="query.trim() && !results.length">
        <div class="py-8 text-center text-gray-400">
          <svg class="w-12 h-12 mx-auto mb-2 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
          <div class="text-sm">未找到匹配结果</div>
        </div>
      </template>
    </div>
    <div class="px-4 py-2.5 border-t border-gray-200 dark:border-gray-700 flex items-center gap-4 text-xs text-gray-400">
      <span class="flex items-center gap-1"><kbd class="px-1 py-0.5 bg-gray-100 dark:bg-gray-800 border rounded">↑↓</kbd> 导航</span>
      <span class="flex items-center gap-1"><kbd class="px-1 py-0.5 bg-gray-100 dark:bg-gray-800 border rounded">Enter</kbd> 选中</span>
      <span class="flex items-center gap-1"><kbd class="px-1 py-0.5 bg-gray-100 dark:bg-gray-800 border rounded">ESC</kbd> 关闭</span>
    </div>
  </div>
</div>

<script type="module">
  function toggleFullscreen() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen()
    else document.exitFullscreen()
  }
  window.toggleFullscreen = toggleFullscreen
</script>
